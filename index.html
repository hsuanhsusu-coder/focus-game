<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>專注力 Power Up！— 則翰的成長冒險</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap');
:root {
  --bg-dark: #0a0e1a;
  --bg-panel: #111827;
  --bg-card: #1e2740;
  --accent-green: #39ff14;
  --accent-cyan: #00e5ff;
  --accent-yellow: #ffe600;
  --accent-orange: #ff9100;
  --accent-pink: #ff4081;
  --accent-purple: #b388ff;
  --text-main: #e8eaf6;
  --text-dim: #7986cb;
  --ikigai-love: #ff4081;
  --ikigai-good: #00e5ff;
  --ikigai-need: #ffe600;
  --ikigai-pay: #39ff14;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg-dark);color:var(--text-main);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999}
#game{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.screen{display:none;padding:16px;min-height:100vh;animation:fadeIn .5s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* TITLE */
#title-screen{justify-content:center;align-items:center;text-align:center;background:radial-gradient(ellipse at 50% 30%,rgba(57,255,20,0.08) 0%,transparent 70%)}
.title-logo{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent-green);text-shadow:0 0 20px var(--accent-green);letter-spacing:2px;margin-bottom:6px}
.title-main{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;margin-bottom:8px}
.title-sub{font-size:15px;color:var(--text-dim);margin-bottom:8px;line-height:1.6}
.pixel-dad{font-size:56px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Level badge on title */
.title-level-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:20px;margin-bottom:16px;
  background:linear-gradient(135deg,rgba(255,230,0,0.1),rgba(255,145,0,0.08));
  border:1px solid rgba(255,230,0,0.3);font-size:13px;
}
.title-level-badge .lvl{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--accent-yellow)}
.title-level-badge .stage{color:var(--accent-orange);font-weight:700}

.title-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}

/* BUTTONS */
.btn{display:inline-block;padding:13px 28px;border:2px solid var(--accent-green);background:rgba(57,255,20,0.1);color:var(--accent-green);font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{background:rgba(57,255,20,0.25);box-shadow:0 0 20px rgba(57,255,20,0.3);transform:scale(1.03)}
.btn-tomato{display:inline-block;padding:13px 28px;border:2px solid var(--accent-orange);background:rgba(255,145,0,0.1);color:var(--accent-orange);font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.btn-tomato:hover{background:rgba(255,145,0,0.25);box-shadow:0 0 20px rgba(255,145,0,0.3)}
.btn-profile{display:inline-block;padding:13px 28px;border:2px solid var(--accent-purple);background:rgba(179,136,255,0.08);color:var(--accent-purple);font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.btn-profile:hover{background:rgba(179,136,255,0.2)}
.btn-choice{display:block;width:100%;padding:13px 15px;margin:5px 0;border:2px solid var(--bg-card);background:var(--bg-card);color:var(--text-main);font-family:'Noto Sans TC',sans-serif;font-size:14px;border-radius:10px;cursor:pointer;transition:all .2s;text-align:left;line-height:1.5;-webkit-tap-highlight-color:transparent}
.btn-choice:hover,.btn-choice:active{border-color:var(--accent-cyan);background:rgba(0,229,255,0.08)}
.btn-choice .choice-icon{margin-right:7px;font-size:16px}
.btn-next{display:block;width:100%;padding:13px;margin-top:10px;border:2px solid var(--accent-green);background:linear-gradient(135deg,rgba(57,255,20,0.15),rgba(0,229,255,0.1));color:var(--accent-green);font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.btn-next:hover{box-shadow:0 0 20px rgba(57,255,20,0.3)}

/* DIALOGUE */
.dialogue-area{flex:1;overflow-y:auto;padding-bottom:8px}
.msg{display:flex;gap:10px;margin-bottom:12px;animation:msgIn .4s ease}
.msg.dad{flex-direction:row}.msg.kid{flex-direction:row-reverse}.msg.narrator{justify-content:center}
@keyframes msgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid}
.msg.dad .msg-avatar{background:rgba(57,255,20,0.1);border-color:var(--accent-green)}
.msg.kid .msg-avatar{background:rgba(0,229,255,0.1);border-color:var(--accent-cyan)}
.msg-bubble{max-width:80%;padding:11px 14px;border-radius:14px;line-height:1.7;font-size:14px}
.msg.dad .msg-bubble{background:var(--bg-card);border:1px solid rgba(57,255,20,0.15);border-radius:14px 14px 14px 4px}
.msg.kid .msg-bubble{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);border-radius:14px 14px 4px 14px}
.msg.narrator .msg-bubble{max-width:90%;background:linear-gradient(135deg,rgba(179,136,255,0.1),rgba(255,64,129,0.08));border:1px dashed var(--accent-purple);border-radius:12px;text-align:center;font-size:13px;color:var(--accent-purple);padding:12px 18px}
.msg-bubble strong{color:var(--accent-yellow)}.msg-bubble em{color:var(--accent-cyan);font-style:normal}
.msg-bubble .hl-g{color:var(--accent-green);font-weight:700}.msg-bubble .hl-p{color:var(--accent-pink);font-weight:700}
.choice-area{padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.chapter-header{text-align:center;padding:18px 0 12px;margin-bottom:8px}
.chapter-num{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent-green);letter-spacing:3px;margin-bottom:5px}
.chapter-title{font-size:20px;font-weight:900;background:linear-gradient(90deg,var(--accent-yellow),var(--accent-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* WIDGETS */
.widget-card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;margin:8px 0}
.stats-bar{display:flex;gap:6px;padding:7px 10px;background:var(--bg-panel);border-radius:10px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.05)}
.stat-item{flex:1;text-align:center;font-size:10px;color:var(--text-dim)}
.stat-val{font-size:16px;font-weight:900;display:block;margin-bottom:2px}
.stat-val.green{color:var(--accent-green)}.stat-val.cyan{color:var(--accent-cyan)}.stat-val.yellow{color:var(--accent-yellow)}.stat-val.pink{color:var(--accent-pink)}.stat-val.orange{color:var(--accent-orange)}

.resource-bar{display:flex;align-items:center;gap:10px;margin:6px 0;padding:9px 12px;background:rgba(0,0,0,0.3);border-radius:10px;cursor:pointer;transition:all .3s;border:2px solid transparent}
.resource-bar:hover,.resource-bar.selected{border-color:var(--accent-cyan);background:rgba(0,229,255,0.05)}
.resource-icon{font-size:26px}.resource-info{flex:1}.resource-name{font-weight:700;font-size:15px}.resource-desc{font-size:11px;color:var(--text-dim);margin-top:2px}
.resource-rank{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--accent-yellow)}
.ikigai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.ikigai-card{padding:12px;border-radius:12px;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent}
.ikigai-card.love{background:rgba(255,64,129,0.1);border-color:rgba(255,64,129,0.3)}
.ikigai-card.good{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.3)}
.ikigai-card.need{background:rgba(255,230,0,0.08);border-color:rgba(255,230,0,0.3)}
.ikigai-card.pay{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.3)}
.ikigai-icon{font-size:28px;display:block;margin-bottom:4px}.ikigai-label{font-size:13px;font-weight:700}.ikigai-sub{font-size:10px;color:var(--text-dim);margin-top:3px}
.thought-input{width:100%;padding:12px;background:var(--bg-card);border:2px solid rgba(0,229,255,0.3);border-radius:12px;color:var(--text-main);font-family:'Noto Sans TC',sans-serif;font-size:15px;resize:none;outline:none;min-height:55px}
.thought-input::placeholder{color:var(--text-dim)}.thought-input:focus{border-color:var(--accent-cyan);box-shadow:0 0 15px rgba(0,229,255,0.15)}
.progress-bar-wrap{width:100%;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-green),var(--accent-cyan));border-radius:2px;transition:width .5s ease}
.reward-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid var(--accent-yellow);border-radius:16px;padding:18px;text-align:center;margin:12px 0;position:relative;overflow:hidden}
.reward-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(255,230,0,0.05),transparent,rgba(57,255,20,0.05),transparent);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.reward-card>*{position:relative;z-index:1}
.reward-icon{font-size:42px;margin-bottom:6px}.reward-title{font-size:16px;font-weight:900;color:var(--accent-yellow);margin-bottom:4px}.reward-desc{font-size:12px;color:var(--text-dim)}
.mini-map{display:flex;justify-content:center;gap:5px;padding:8px 0}
.map-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all .3s}
.map-dot.done{background:var(--accent-green);box-shadow:0 0 6px var(--accent-green)}
.map-dot.current{background:var(--accent-cyan);box-shadow:0 0 8px var(--accent-cyan);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.typing-indicator{display:inline-flex;gap:4px;padding:8px 14px;background:var(--bg-card);border-radius:14px;margin:6px 0}
.typing-indicator span{width:5px;height:5px;background:var(--text-dim);border-radius:50%;animation:typingB 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typingB{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.achievement{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid var(--accent-yellow);border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:10px;z-index:10000;transition:transform .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 30px rgba(0,0,0,.5)}
.achievement.show{transform:translateX(-50%) translateY(0)}
.achievement-icon{font-size:26px}.achievement-text{font-size:12px}.achievement-text strong{color:var(--accent-yellow);display:block;font-size:13px}
.compare-table{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.compare-col{padding:12px;border-radius:12px;text-align:center}
.compare-col.bad{background:rgba(255,64,129,0.08);border:1px solid rgba(255,64,129,0.2)}
.compare-col.good{background:rgba(57,255,20,0.08);border:1px solid rgba(57,255,20,0.2)}
.compare-col h4{font-size:14px;margin-bottom:6px}.compare-col.bad h4{color:var(--accent-pink)}.compare-col.good h4{color:var(--accent-green)}
.compare-col ul{list-style:none;text-align:left;font-size:12px;color:var(--text-dim)}.compare-col li{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}.compare-col li:last-child{border:none}
.journal-entry{background:rgba(255,230,0,0.04);border-left:3px solid var(--accent-yellow);padding:10px 12px;margin:6px 0;border-radius:0 10px 10px 0;font-size:13px}
.journal-entry .j-label{font-size:10px;color:var(--accent-yellow);font-weight:700;margin-bottom:3px}
.timer-display{font-family:'Press Start 2P',monospace;font-size:32px;color:var(--accent-green);text-align:center;padding:18px;text-shadow:0 0 20px var(--accent-green);background:rgba(0,0,0,0.4);border-radius:12px;margin:8px 0}
.stars-bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:-1;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.8}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ===== PROFILE / GROWTH MAP SCREEN ===== */
#profile-screen{padding:0;background:radial-gradient(ellipse at 50% 10%,rgba(179,136,255,0.06) 0%,transparent 60%)}
.prof-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.prof-back{background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;padding:5px 8px;border-radius:8px;-webkit-tap-highlight-color:transparent}
.prof-title{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent-purple);letter-spacing:1px}
.prof-body{flex:1;overflow-y:auto;padding:14px}

/* Evolution Path */
.evo-path{position:relative;padding:10px 0 10px 32px;margin:12px 0}
.evo-path::before{content:'';position:absolute;left:14px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent-green),var(--accent-cyan),var(--accent-purple));border-radius:2px}
.evo-stage{position:relative;padding:10px 14px;margin-bottom:10px;background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,0.05);transition:all .3s}
.evo-stage::before{content:'';position:absolute;left:-24px;top:16px;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2)}
.evo-stage.done::before{background:var(--accent-green);border-color:var(--accent-green);box-shadow:0 0 8px var(--accent-green)}
.evo-stage.current::before{background:var(--accent-cyan);border-color:var(--accent-cyan);box-shadow:0 0 10px var(--accent-cyan);animation:pulse 1.5s infinite}
.evo-stage.current{border-color:var(--accent-cyan);background:rgba(0,229,255,0.05)}
.evo-stage.locked{opacity:.5}
.evo-stage-title{font-size:14px;font-weight:700;margin-bottom:3px}
.evo-stage-desc{font-size:11px;color:var(--text-dim);line-height:1.5}
.evo-stage-lv{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text-dim);margin-bottom:4px}

/* XP Bar */
.xp-bar-wrap{margin:12px 0}
.xp-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:4px}
.xp-bar{height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-green));border-radius:5px;transition:width .8s ease}

/* Superpower Badges */
.badge-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.badge-card{text-align:center;padding:14px 8px;background:var(--bg-card);border-radius:14px;border:2px solid rgba(255,255,255,0.06);transition:all .3s;position:relative;overflow:hidden}
.badge-card.unlocked{border-color:var(--accent-yellow)}
.badge-card.unlocked::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(255,230,0,0.03),transparent);animation:spin 6s linear infinite}
.badge-card.locked{opacity:.4;filter:grayscale(1)}
.badge-icon{font-size:32px;display:block;margin-bottom:6px;position:relative;z-index:1}
.badge-name{font-size:12px;font-weight:700;position:relative;z-index:1}
.badge-req{font-size:9px;color:var(--text-dim);margin-top:3px;position:relative;z-index:1}
.badge-card.unlocked .badge-name{color:var(--accent-yellow)}

/* Trust Engine */
.trust-meter{margin:12px 0}
.trust-gear{display:flex;align-items:center;justify-content:center;gap:4px;margin:8px 0}
.trust-gear-item{text-align:center;padding:10px;background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,0.05);flex:1}
.trust-gear-item.active{border-color:var(--accent-orange);background:rgba(255,145,0,0.06)}
.trust-gear-icon{font-size:24px;display:block;margin-bottom:4px}
.trust-gear-label{font-size:10px;color:var(--text-dim)}
.trust-arrow{font-size:18px;color:var(--accent-orange);flex-shrink:0}

/* Victory Report */
.victory-report{background:linear-gradient(135deg,rgba(57,255,20,0.06),rgba(0,229,255,0.04));border:1px solid rgba(57,255,20,0.2);border-radius:14px;padding:14px;margin:12px 0}
.victory-report-text{font-size:13px;line-height:1.7;color:var(--text-main);white-space:pre-line}
.copy-btn{display:block;width:100%;padding:10px;margin-top:8px;border:1px solid var(--accent-cyan);background:rgba(0,229,255,0.08);color:var(--accent-cyan);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* Mission Card */
.mission-card{background:linear-gradient(135deg,rgba(255,145,0,0.08),rgba(255,230,0,0.05));border:1px solid rgba(255,145,0,0.25);border-radius:14px;padding:14px;margin:10px 0}
.mission-card-title{font-size:14px;font-weight:900;color:var(--accent-orange);margin-bottom:6px}
.mission-card-text{font-size:13px;line-height:1.7;color:var(--text-dim)}

/* ===== POMODORO SCREEN ===== */
#pomo-screen{padding:0;background:radial-gradient(ellipse at 50% 20%,rgba(255,145,0,0.06) 0%,transparent 60%)}
.pomo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.pomo-back{background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;padding:5px 8px;border-radius:8px;-webkit-tap-highlight-color:transparent}
.pomo-header-title{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent-orange);letter-spacing:1px}
.pomo-streak-badge{font-size:12px;color:var(--accent-yellow);font-weight:700}
.pomo-body{flex:1;display:flex;flex-direction:column;padding:14px;overflow-y:auto}
.pomo-ring-wrap{position:relative;width:220px;height:220px;margin:8px auto 12px}
.pomo-ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:8}
.pomo-ring-fill{fill:none;stroke:var(--accent-green);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s;filter:drop-shadow(0 0 8px var(--accent-green))}
.pomo-ring-fill.break-mode{stroke:var(--accent-cyan);filter:drop-shadow(0 0 8px var(--accent-cyan))}
.pomo-ring-fill.warn{stroke:var(--accent-pink);filter:drop-shadow(0 0 12px var(--accent-pink))}
.pomo-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.pomo-time{font-family:'Press Start 2P',monospace;font-size:28px;color:var(--accent-green);text-shadow:0 0 15px rgba(57,255,20,0.5);transition:color .5s}
.pomo-time.break-mode{color:var(--accent-cyan);text-shadow:0 0 15px rgba(0,229,255,0.5)}
.pomo-time.warn{color:var(--accent-pink);text-shadow:0 0 15px rgba(255,64,129,0.5);animation:pulse 1s infinite}
.pomo-phase-label{font-size:12px;color:var(--text-dim);margin-top:4px;font-weight:700}
.pomo-ring-wrap .star-particle{position:absolute;width:4px;height:4px;background:var(--accent-yellow);border-radius:50%;opacity:0;pointer-events:none}
.pomo-ring-wrap .star-particle.active{animation:starFloat 2s ease-out forwards}
@keyframes starFloat{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.pomo-controls{display:flex;gap:8px;justify-content:center;margin:8px 0 14px}
.pomo-btn{padding:10px 22px;border:2px solid;border-radius:12px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.pomo-btn-start{border-color:var(--accent-green);background:rgba(57,255,20,0.12);color:var(--accent-green)}
.pomo-btn-pause{border-color:var(--accent-yellow);background:rgba(255,230,0,0.1);color:var(--accent-yellow)}
.pomo-btn-reset{border-color:var(--accent-pink);background:rgba(255,64,129,0.08);color:var(--accent-pink)}
.pomo-btn-skip{border-color:var(--accent-cyan);background:rgba(0,229,255,0.08);color:var(--accent-cyan)}
.pomo-duration-section{margin-bottom:14px}
.pomo-section-label{font-size:11px;color:var(--text-dim);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pomo-duration-options{display:flex;gap:6px}
.pomo-dur-btn{flex:1;padding:8px 0;border:2px solid rgba(255,255,255,0.1);background:var(--bg-card);border-radius:10px;color:var(--text-main);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.pomo-dur-btn.active{border-color:var(--accent-orange);background:rgba(255,145,0,0.12);color:var(--accent-orange)}
.pomo-dur-btn span{font-size:10px;color:var(--text-dim);display:block;margin-top:2px}
.pomo-tasks-section{margin-bottom:14px}
.pomo-task-list{list-style:none}
.pomo-task-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-card);border-radius:10px;margin-bottom:5px;border:1px solid rgba(255,255,255,0.05)}
.pomo-task-item.done{opacity:.5}.pomo-task-item.done .pomo-task-text{text-decoration:line-through;color:var(--text-dim)}
.pomo-task-check{width:20px;height:20px;border:2px solid var(--accent-cyan);border-radius:6px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent}
.pomo-task-item.done .pomo-task-check{background:var(--accent-cyan);color:var(--bg-dark)}
.pomo-task-text{flex:1;font-size:13px}
.pomo-task-del{background:none;border:none;color:var(--text-dim);font-size:15px;cursor:pointer;padding:3px;opacity:.4}
.pomo-task-del:hover{opacity:1;color:var(--accent-pink)}
.pomo-add-task-row{display:flex;gap:6px;margin-top:5px}
.pomo-task-input{flex:1;padding:9px 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text-main);font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none}
.pomo-task-input::placeholder{color:var(--text-dim)}.pomo-task-input:focus{border-color:var(--accent-cyan)}
.pomo-add-btn{padding:9px 14px;background:rgba(0,229,255,0.1);border:1px solid var(--accent-cyan);border-radius:10px;color:var(--accent-cyan);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
.pomo-today-stats{display:flex;gap:6px;margin-bottom:14px}
.pomo-stat-card{flex:1;text-align:center;padding:10px 6px;background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.pomo-stat-num{font-family:'Press Start 2P',monospace;font-size:16px;display:block;margin-bottom:3px}
.pomo-stat-label{font-size:10px;color:var(--text-dim)}
.pomo-combo-banner{text-align:center;padding:8px;background:linear-gradient(90deg,rgba(255,230,0,0.08),rgba(255,145,0,0.08));border:1px solid rgba(255,230,0,0.2);border-radius:12px;margin-bottom:12px;display:none}
.pomo-combo-banner.show{display:block;animation:fadeIn .5s ease}
.pomo-combo-text{font-size:13px;color:var(--accent-yellow);font-weight:700}
.pomo-combo-stars{font-size:18px;letter-spacing:2px}
.pomo-dad-tip{display:flex;gap:8px;padding:10px 12px;background:rgba(57,255,20,0.04);border:1px solid rgba(57,255,20,0.1);border-radius:12px;margin-bottom:12px;align-items:flex-start}
.pomo-dad-tip-avatar{font-size:24px;flex-shrink:0}
.pomo-dad-tip-text{font-size:12px;line-height:1.6;color:var(--text-dim)}
.pomo-dad-tip-text strong{color:var(--accent-green)}

/* Level up banner in pomo */
.pomo-levelup{text-align:center;padding:10px;background:linear-gradient(135deg,rgba(179,136,255,0.1),rgba(57,255,20,0.08));border:1px solid var(--accent-purple);border-radius:12px;margin-bottom:12px;display:none}
.pomo-levelup.show{display:block;animation:fadeIn .5s ease}
.pomo-levelup-text{font-size:14px;color:var(--accent-purple);font-weight:700}
</style>
</head>
<body>
<div class="stars-bg" id="starsBg"></div>
<div class="achievement" id="achievement"><div class="achievement-icon" id="achIcon">🏆</div><div class="achievement-text" id="achText"><strong>成就解鎖！</strong></div></div>

<div id="game">
  <!-- TITLE -->
  <div class="screen active" id="title-screen">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;">
      <div class="pixel-dad">🦸‍♂️</div>
      <div class="title-logo">★ POWER UP ★</div>
      <div class="title-main">專注力<br>大冒險</div>
      <div class="title-sub">則翰的成長探索之旅 🗺️</div>
      <div class="title-level-badge" id="titleLevelBadge"><span class="lvl" id="titleLv">Lv.1</span><span class="stage" id="titleStage">聽話的小幫手</span></div>
      <div class="title-buttons">
        <button class="btn" onclick="startGame()" id="storyBtn">▶ 開始冒險</button>
        <button class="btn-tomato" onclick="openPomo()">🍅 無敵星星計時器</button>
        <button class="btn-profile" onclick="openProfile()">🗺️ 我的成長地圖</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="game-screen">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="mini-map" id="miniMap"></div>
    <div class="dialogue-area" id="dialogueArea"></div>
    <div class="choice-area" id="choiceArea"></div>
  </div>

  <!-- PROFILE / GROWTH MAP -->
  <div class="screen" id="profile-screen">
    <div class="prof-header">
      <button class="prof-back" onclick="showScreen('title-screen')">← 返回</button>
      <div class="prof-title">GROWTH MAP</div>
      <div style="width:40px"></div>
    </div>
    <div class="prof-body" id="profBody"></div>
  </div>

  <!-- POMODORO -->
  <div class="screen" id="pomo-screen">
    <div class="pomo-header">
      <button class="pomo-back" onclick="closePomo()">← 返回</button>
      <div class="pomo-header-title">FOCUS TIMER</div>
      <div class="pomo-streak-badge" id="pomoStreakBadge">🔥 0</div>
    </div>
    <div class="pomo-body">
      <div class="pomo-dad-tip" id="pomoDadTip"><div class="pomo-dad-tip-avatar">👨</div><div class="pomo-dad-tip-text" id="pomoDadTipText">準備好了嗎？先寫下要<strong>打倒的小怪</strong>（任務），然後啟動無敵星星！⭐</div></div>
      <div class="pomo-combo-banner" id="pomoCombo"><div class="pomo-combo-stars" id="pomoComboStars">⭐⭐⭐</div><div class="pomo-combo-text" id="pomoComboText">3 連擊！</div></div>
      <div class="pomo-levelup" id="pomoLevelUp"><div class="pomo-levelup-text" id="pomoLevelUpText">🆙 Lv.5 → 好奇的探險家！</div></div>
      <div class="pomo-ring-wrap" id="pomoRingWrap">
        <svg class="pomo-ring-svg" viewBox="0 0 240 240"><circle class="pomo-ring-bg" cx="120" cy="120" r="105"/><circle class="pomo-ring-fill" id="pomoRingFill" cx="120" cy="120" r="105" stroke-dasharray="659.73" stroke-dashoffset="0"/></svg>
        <div class="pomo-ring-center"><div class="pomo-time" id="pomoTimeDisplay">15:00</div><div class="pomo-phase-label" id="pomoPhaseLabel"><span class="phase-icon">⭐</span> 準備就緒</div></div>
      </div>
      <div class="pomo-controls" id="pomoControls"><button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">⭐ 啟動無敵星星</button></div>
      <div class="pomo-duration-section" id="pomoDurSection">
        <div class="pomo-section-label">⏱️ 專注時間</div>
        <div class="pomo-duration-options">
          <button class="pomo-dur-btn" data-focus="10" onclick="setFDur(10,this)">10分<span>入門</span></button>
          <button class="pomo-dur-btn active" data-focus="15" onclick="setFDur(15,this)">15分<span>標準</span></button>
          <button class="pomo-dur-btn" data-focus="25" onclick="setFDur(25,this)">25分<span>進階</span></button>
        </div>
        <div class="pomo-section-label" style="margin-top:8px">☕ 休息時間</div>
        <div class="pomo-duration-options">
          <button class="pomo-dur-btn" data-break="3" onclick="setBDur(3,this)">3分<span>快速</span></button>
          <button class="pomo-dur-btn active" data-break="5" onclick="setBDur(5,this)">5分<span>標準</span></button>
          <button class="pomo-dur-btn" data-break="10" onclick="setBDur(10,this)">10分<span>長休</span></button>
        </div>
      </div>
      <div class="pomo-tasks-section">
        <div class="pomo-section-label">🎯 今日任務（先列出要打的怪物！）</div>
        <ul class="pomo-task-list" id="pomoTaskList"></ul>
        <div class="pomo-add-task-row"><input class="pomo-task-input" id="pomoTaskInput" placeholder="例如：數學第3題～第5題" maxlength="50"><button class="pomo-add-btn" onclick="addTask()">+</button></div>
      </div>
      <div class="pomo-today-stats">
        <div class="pomo-stat-card"><span class="pomo-stat-num" style="color:var(--accent-orange)" id="psS">0</span><span class="pomo-stat-label">回合</span></div>
        <div class="pomo-stat-card"><span class="pomo-stat-num" style="color:var(--accent-green)" id="psM">0</span><span class="pomo-stat-label">分鐘</span></div>
        <div class="pomo-stat-card"><span class="pomo-stat-num" style="color:var(--accent-yellow)" id="psK">0</span><span class="pomo-stat-label">連擊</span></div>
        <div class="pomo-stat-card"><span class="pomo-stat-num" style="color:var(--accent-cyan)" id="psT">0</span><span class="pomo-stat-label">任務</span></div>
      </div>
      <div class="victory-report" id="victoryReport" style="display:none">
        <div style="font-size:12px;color:var(--accent-green);font-weight:700;margin-bottom:6px">📣 勝利信號（可複製傳給媽媽）</div>
        <div class="victory-report-text" id="victoryReportText"></div>
        <button class="copy-btn" onclick="copyReport()">📋 複製勝利信號</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== PERSISTENT DATA ====================
const SAVE_KEY = 'focus-powerup-v3';
let SAVE = {
  level: 1, xp: 0,
  totalSessions: 0, totalMinutes: 0, totalTasks: 0, bestStreak: 0,
  badges: { innovator: false, negotiator: false, pioneer: false },
  storyDone: false, answers: {},
  specialMission: '',
  createdAt: Date.now()
};

function loadSave() {
  try {
    const d = localStorage.getItem(SAVE_KEY);
    if (d) SAVE = { ...SAVE, ...JSON.parse(d) };
  } catch(e) {}
  updateTitleBadge();
}
function saveSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(SAVE)); } catch(e) {}
}
function resetSave() {
  if (!confirm('確定要重置所有進度嗎？')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

// ==================== LEVEL SYSTEM ====================
// XP required per level: 15 * level
// Stages: 1-4 小幫手, 5-14 探險家, 15-29 開拓者, 30+ 發明家/隊長
function xpForLevel(lv) { return 15 * lv; }
function stageName(lv) {
  if (lv < 5) return '聽話的小幫手';
  if (lv < 15) return '好奇的探險家';
  if (lv < 30) return '勇敢的開拓者';
  return '厲害的發明家';
}
function stageEmoji(lv) {
  if (lv < 5) return '🐣';
  if (lv < 15) return '🧭';
  if (lv < 30) return '⚔️';
  return '🏆';
}
function addXP(amount) {
  SAVE.xp += amount;
  let leveledUp = false;
  while (SAVE.xp >= xpForLevel(SAVE.level)) {
    SAVE.xp -= xpForLevel(SAVE.level);
    SAVE.level++;
    leveledUp = true;
  }
  // Check badges
  if (SAVE.totalSessions >= 5 && !SAVE.badges.pioneer) { SAVE.badges.pioneer = true; showAch('🏔️ 勇敢的先鋒 解鎖！','完成 5 回合專注'); }
  if (SAVE.totalSessions >= 15 && !SAVE.badges.negotiator) { SAVE.badges.negotiator = true; showAch('🤝 談判專家 解鎖！','累積 15 回合專注'); }
  if (SAVE.totalSessions >= 30 && !SAVE.badges.innovator) { SAVE.badges.innovator = true; showAch('💡 創新者 解鎖！','累積 30 回合專注'); }
  saveSave();
  updateTitleBadge();
  return leveledUp;
}
function updateTitleBadge() {
  const lv = document.getElementById('titleLv');
  const st = document.getElementById('titleStage');
  if (lv) lv.textContent = `Lv.${SAVE.level}`;
  if (st) st.textContent = stageName(SAVE.level);
  const btn = document.getElementById('storyBtn');
  if (btn) btn.textContent = SAVE.storyDone ? '▶ 重溫冒險' : '▶ 開始冒險';
}

// ==================== GAME STATE ====================
const GS = { chapter: 0, step: 0, insights: 0, stars: 0, freePoints: 0, answers: {} };
let sceneIdx = 0, isAnim = false;

// ==================== CHAPTERS ====================
const CH = [
  // CH0: 英雄身世
  { title: '英雄身世解密', scenes: [
    { type:'narrator', text:'📜 在開始冒險之前，爸爸想先告訴你一個關於你自己的祕密...' },
    { type:'chapter', num:'PROLOGUE', title:'🧬 英雄身世解密' },
    { type:'dad', text:'則翰，你有沒有發現，你常常不想走別人走過的路？', delay:800 },
    { type:'dad', text:'比如說，哥哥用某個方法做功課，你就偏偏想用不一樣的方式？或者大家都在玩同一個遊戲，你卻想研究別的？', delay:1000 },
    { type:'choice', text:'你有這種感覺嗎？', choices:[
      { icon:'✋', text:'對！我就是不想跟別人一樣', value:'yes' },
      { icon:'🤔', text:'好像有時候會這樣...', value:'sometimes' },
      { icon:'😅', text:'我也不知道為什麼', value:'unsure' },
    ], onChoice: v => { GS.answers.pathB = v; GS.insights++; }},
    { type:'dad', text:'爸爸告訴你——這<strong>不是叛逆</strong>。', delay:600 },
    { type:'dad', text:'心理學家阿德勒說，每個家庭裡的孩子，都會自動去尋找一條<em>沒有人走過的路</em>。\n\n因為前面已經有哥哥了，所以你天生具備一種超能力——', delay:1000 },
    { type:'dad', text:'叫做<span class="hl-g">「超越者本能」</span>。🧬', delay:800 },
    { type:'narrator', text:'💡 超越者本能：你不是要「比哥哥好」，而是要「走出完全不同的路」。' },
    { type:'dad', text:'想像兩條路：\n\n🛤️ <strong>Path A</strong>（穩定路徑）—— 大家都走的路，很安全，但已經很擠了。\n\n🌿 <strong>Path B</strong>（探索路徑）—— 沒人走過，充滿花朵和未知，但只有勇敢的人才敢走。', delay:1200 },
    { type:'dad', text:'你天生就是走 Path B 的人。\n\n你的強大不在於「力量」，而在於無可取代的<span class="hl-g">「靈活性」</span>。', delay:1000 },
    { type:'narrator', text:'🎖️ 你的英雄定位：「開拓者」— 靠內在驅動力和靈活性，走出自己的路' },
    { type:'next', text:'解鎖三大超能力 →' }
  ]},
  // CH1: 三大超能力
  { title: '三大超能力', scenes: [
    { type:'chapter', num:'CHAPTER 1', title:'🎖️ 隱藏的三大超能力' },
    { type:'dad', text:'每個英雄都有自己的技能樹。爸爸在你身上，看到了三個<strong>隱藏的超能力</strong>：', delay:800 },
    { type:'widget', widget:'three-badges' },
    { type:'dad', text:'💡 <strong>創新者</strong>——你比一般人更願意接受新想法，敢挑戰規則。\n別人說「不行」，你會想「為什麼不行？」', delay:1000 },
    { type:'dad', text:'🤝 <strong>談判專家</strong>——你很會觀察別人的想法，懂得怎麼說服人、協調衝突。這是因為你長期在觀察位置，學會了察言觀色。', delay:1000 },
    { type:'dad', text:'🏔️ <strong>勇敢的先鋒</strong>——面對未知，你更傾向選擇高風險、高報酬的策略。別人害怕的，你反而覺得刺激。', delay:1000 },
    { type:'dad', text:'這三個超能力不會自己變強。它們需要<em>燃料</em>。\n\n而那個燃料就是——<span class="hl-g">你的專注力</span>。', delay:1000 },
    { type:'choice', text:'每一次專注衝刺，都在強化哪個屬性？', choices:[
      { icon:'💡', text:'創新者！我想出更多新點子', value:'innovator' },
      { icon:'🤝', text:'談判專家！我更了解別人', value:'negotiator' },
      { icon:'🏔️', text:'勇敢的先鋒！我更敢挑戰', value:'pioneer' },
      { icon:'⭐', text:'三個都是！', value:'all' },
    ], onChoice: v => { GS.answers.superpower = v; GS.insights++; GS.stars++; }},
    { type:'dad', text:'沒錯！每次你認真專注，三個超能力都在同時升級。\n\n這就是為什麼爸爸說——<strong>注意力是你最珍貴的資源</strong>。', delay:800 },
    { type:'narrator', text:'🌟 核心價值觀 #1 解鎖：注意力 > 時間 > 金錢' },
    { type:'next', text:'了解資源層級 →' }
  ]},
  // CH2: 資源層級 + 自由點數
  { title: '資源層級', scenes: [
    { type:'chapter', num:'CHAPTER 2', title:'💎 資源層級 + 自由點數' },
    { type:'dad', text:'三個資源，有一個<strong>隱藏排名</strong>——像遊戲道具的 S / A / B 級：', delay:600 },
    { type:'widget', widget:'resource-pyramid' },
    { type:'dad', text:'🧠 <strong>注意力</strong>是經驗值倍率器。開了 100%，打怪經驗 ×10。放空？打十隻才 10 點。😂', delay:800 },
    { type:'dad', text:'專注寫功課 30 分鐘 = 發呆寫 1 小時。\n省下來的時間就是你的<strong>「自由點數」</strong>💰', delay:800 },
    { type:'choice', text:'平常寫功課花多久？', choices:[
      { icon:'⏱️', text:'大概 1 小時', value:'60' },
      { icon:'⏱️', text:'大概 1.5 小時', value:'90' },
      { icon:'⏱️', text:'超過 2 小時 😫', value:'120' },
    ], onChoice: v => { GS.answers.hwTime = parseInt(v); }},
    { type:'dad', text: () => {
      const t=GS.answers.hwTime||60, s=Math.round(t*0.4); GS.freePoints+=s;
      return `專注模式只需 ${t-s} 分鐘！你多出 <strong>${s} 分鐘</strong>自由點數！\n一週累積 ${s*5} 分鐘！✨`;
    }, delay:800 },
    { type:'next', text:'找到你的 Ikigai →' }
  ]},
  // CH3: Ikigai
  { title: 'Ikigai', scenes: [
    { type:'chapter', num:'CHAPTER 3', title:'⭐ Ikigai 星星地圖' },

// ==================== RENDER ENGINE ====================
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

function showScreen(id){ $$('.screen').forEach(s=>s.classList.remove('active')); $(`#${id}`).classList.add('active'); }

function startGame(){
  showScreen('game-screen');
  GS.chapter=0; sceneIdx=0; GS.insights=0; GS.stars=0; GS.freePoints=0; GS.answers={};
  renderMap(); playCh();
}

function renderMap(){
  const m=$('#miniMap'); m.innerHTML='';
  for(let i=0;i<CH.length;i++){
    const d=document.createElement('div');d.className='map-dot';
    if(i<GS.chapter)d.classList.add('done');if(i===GS.chapter)d.classList.add('current');
    m.appendChild(d);
  }
  $('#progressBar').style.width=`${(GS.chapter/CH.length)*100}%`;
}

async function playCh(){
  const ch=CH[GS.chapter]; if(!ch) return;
  $('#dialogueArea').innerHTML='';$('#choiceArea').innerHTML='';
  sceneIdx=0; await playNext();
}

async function playNext(){
  const ch=CH[GS.chapter]; if(!ch||sceneIdx>=ch.scenes.length) return;
  const sc=ch.scenes[sceneIdx], area=$('#dialogueArea'), ca=$('#choiceArea');

  switch(sc.type){
    case 'chapter':
      area.innerHTML+=`<div class="chapter-header" style="animation:fadeIn .6s"><div class="chapter-num">${sc.num}</div><div class="chapter-title">${sc.title}</div></div>`;
      sceneIdx++;await dl(400);await playNext();break;
    case 'narrator':
      area.innerHTML+=`<div class="msg narrator" style="animation:msgIn .4s"><div class="msg-bubble">${sc.text}</div></div>`;
      scrollB();sceneIdx++;await dl(sc.delay||500);await playNext();break;
    case 'dad':case 'kid':{
      const tid=`t${Date.now()}`;
      area.innerHTML+=`<div class="msg ${sc.type}" id="${tid}"><div class="msg-avatar">${sc.type==='dad'?'👨':'👦'}</div><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      scrollB();await dl(sc.delay||600);
      const txt=typeof sc.text==='function'?sc.text():sc.text;
      const el=document.getElementById(tid);
      if(el)el.innerHTML=`<div class="msg-avatar">${sc.type==='dad'?'👨':'👦'}</div><div class="msg-bubble">${txt.replace(/\n/g,'<br>')}</div>`;
      scrollB();sceneIdx++;await dl(300);await playNext();break;}
    case 'choice':
      ca.innerHTML='';
      if(sc.text)ca.innerHTML+=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:5px;text-align:center">${sc.text}</div>`;
      sc.choices.forEach(c=>{
        const b=document.createElement('button');b.className='btn-choice';
        b.innerHTML=`<span class="choice-icon">${c.icon}</span> ${c.text}`;
        b.onclick=()=>{
          if(isAnim)return;isAnim=true;
          if(sc.onChoice)sc.onChoice(c.value);
          area.innerHTML+=`<div class="msg kid" style="animation:msgIn .4s"><div class="msg-avatar">👦</div><div class="msg-bubble">${c.text}</div></div>`;
          ca.innerHTML='';scrollB();sceneIdx++;
          setTimeout(async()=>{isAnim=false;await playNext()},500);
        };ca.appendChild(b);
      });scrollB();break;
    case 'input':
      ca.innerHTML=`<div style="margin:8px 0"><div style="font-size:12px;color:var(--text-dim);margin-bottom:5px">${sc.prompt}</div><textarea class="thought-input" id="thIn" placeholder="在這裡寫..." rows="2"></textarea><button class="btn-next" id="thSub" style="margin-top:6px">✏️ 寫好了</button></div>`;
      scrollB();
      $('#thSub').onclick=()=>{
        const v=$('#thIn').value.trim()||'（還在想...）';
        GS.answers[sc.key]=v;
        area.innerHTML+=`<div class="msg kid" style="animation:msgIn .4s"><div class="msg-avatar">👦</div><div class="msg-bubble">${v}</div></div>`;
        ca.innerHTML='';scrollB();sceneIdx++;setTimeout(()=>playNext(),500);
      };break;
    case 'widget':
      renderW(sc.widget,area);scrollB();sceneIdx++;await dl(600);await playNext();break;
    case 'next':
      ca.innerHTML=`<button class="btn-next" id="nxC">${sc.text}</button>`;scrollB();
      $('#nxC').onclick=()=>{GS.chapter++;renderMap();ca.innerHTML='';sceneIdx=0;showAch();setTimeout(()=>playCh(),300)};break;
  }
}

        <span class="badge-icon">💡</span>
        <div class="badge-name">創新者</div>
        <div class="badge-req">${SAVE.badges.innovator?'✅ 已解鎖':'🔒 30 回合'}</div>
      </div>
      <div class="badge-card ${SAVE.badges.negotiator?'unlocked':'locked'}">
        <span class="badge-icon">🤝</span>
        <div class="badge-name">談判專家</div>
        <div class="badge-req">${SAVE.badges.negotiator?'✅ 已解鎖':'🔒 15 回合'}</div>
      </div>
      <div class="badge-card ${SAVE.badges.pioneer?'unlocked':'locked'}">
        <span class="badge-icon">🏔️</span>

        <div class="badge-req">${SAVE.badges.pioneer?'✅ 已解鎖':'🔒 5 回合'}</div>

    <div style="font-size:13px;font-weight:700;color:var(--accent-cyan);margin:14px 0 8px">🗺️ 進化路線圖</div>
    <div class="evo-path">
      <div class="evo-stage ${SAVE.level>=1?'done':'locked'}">
        <div class="evo-stage-lv">Lv.1-4</div>

        <div class="evo-stage-desc">會聽大人的話，幫忙做簡單的事情</div>
      </div>
      <div class="evo-stage ${SAVE.level>=5?(SAVE.level<15?'current':'done'):'locked'}">
        <div class="evo-stage-lv">Lv.5-14</div>

      </div>
      <div class="evo-stage ${SAVE.level>=15?(SAVE.level<30?'current':'done'):'locked'}">
        <div class="evo-stage-lv">Lv.15-29</div>
        <div class="evo-stage-title">⚔️ 勇敢的開拓者</div>

    </div>

    ${SAVE.specialMission?`<div class="mission-card"><div class="mission-card-title">📜 我的專屬任務</div><div class="mission-card-text">${SAVE.specialMission}</div></div>`:''}

    ${SAVE.storyDone?`
    <div style="font-size:13px;font-weight:700;color:var(--accent-purple);margin:14px 0 8px">⭐ Ikigai 碎片</div>
    <div class="journal-entry" style="border-color:var(--ikigai-love)"><div class="j-label" style="color:var(--ikigai-love)">❤️ 喜歡</div>${lm[a.love]||'?'} ${a.loveExtra?'· '+a.loveExtra:''}</div>
    <div class="journal-entry" style="border-color:var(--ikigai-good)"><div class="j-label" style="color:var(--ikigai-good)">💪 厲害</div>${gm[a.good]||'?'}</div>
    <div class="journal-entry" style="border-color:var(--ikigai-need)"><div class="j-label" style="color:var(--ikigai-need)">🌍 使命</div>${nm[a.need]||'?'}</div>
    `:''}

    <div style="margin-top:20px;text-align:center">
      <button class="btn-tomato" onclick="openPomo()" style="font-size:14px;padding:10px 20px;margin-bottom:8px;width:100%">🍅 開始賺經驗值</button>
      <button style="background:none;border:1px solid rgba(255,64,129,0.3);color:var(--accent-pink);padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;opacity:.6" onclick="resetSave()">重置所有進度</button>
    </div>
  `;
}

// ==================== POMODORO ====================
const PM = {
  fDur:15, bDur:5, phase:'idle', rem:15*60, total:15*60,
  iv:null, sess:0, min:0, streak:0, bStreak:0, tDone:0, tasks:[], audioCtx:null
};

const DTIPS_F=['專注模式啟動！這段時間裡你就是<strong>無敵的</strong>💪','想像你正在打 Boss！集中火力！🎯','你的注意力正在<strong>全力印鈔</strong>中！💰','你正在強化<strong>先鋒屬性</strong>！每一秒都在升級！🏔️','現在是你的<strong>絕對領域</strong>。🛡️'];
const DTIPS_B=['休息一下！去喝口水 💧','好好休息，下回合再衝！☕','閉上眼深呼吸三次 🌿','戰士也要回血！❤️'];
const DTIPS_D=['太強了！你的專注力正在<strong>升級</strong>！🆙','回合完成！自由點數 +{m}！⭐','漂亮！{n} 連擊 COMBO！🔥'];

function openPomo(){ showScreen('pomo-screen'); pomoReset(); updatePUI(); }
function closePomo(){
  if(PM.phase==='focus'&&!confirm('專注中！確定離開？'))return;
  if(PM.iv)clearInterval(PM.iv); PM.phase='idle'; showScreen('title-screen');
}
function setFDur(m,el){ if(PM.phase!=='idle')return; PM.fDur=m; document.querySelectorAll('[data-focus]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); pomoReset(); }
function setBDur(m,el){ if(PM.phase!=='idle')return; PM.bDur=m; document.querySelectorAll('[data-break]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
function pomoReset(){ if(PM.iv)clearInterval(PM.iv); PM.phase='idle'; PM.rem=PM.fDur*60; PM.total=PM.fDur*60; updatePUI(); }
function pomoToggle(){
  switch(PM.phase){
    case'idle':pomoStartF();break;
    case'focus':PM.phase='pf';clearInterval(PM.iv);updatePUI();break;
    case'pf':PM.phase='focus';pomoTick();updatePUI();break;
    case'break':PM.phase='pb';clearInterval(PM.iv);updatePUI();break;
    case'pb':PM.phase='break';pomoTick();updatePUI();break;
  }
}
function pomoStartF(){
  PM.phase='focus';PM.rem=PM.fDur*60;PM.total=PM.fDur*60;
  setTip(DTIPS_F[Math.floor(Math.random()*DTIPS_F.length)]);
  pomoTick();updatePUI();
}
function pomoStartB(){
  PM.phase='break';PM.rem=PM.bDur*60;PM.total=PM.bDur*60;
  setTip(DTIPS_B[Math.floor(Math.random()*DTIPS_B.length)]);
  pomoTick();updatePUI();
}
function pomoSkipB(){ if(PM.iv)clearInterval(PM.iv); PM.phase='idle'; PM.rem=PM.fDur*60; PM.total=PM.fDur*60; setTip('準備好了嗎？啟動下一回合無敵星星！⭐'); updatePUI(); }
function pomoTick(){
  if(PM.iv)clearInterval(PM.iv);
  PM.iv=setInterval(()=>{
    PM.rem--;
    if(PM.rem<=0){clearInterval(PM.iv);PM.phase==='focus'?pomoComplF():pomoComplB();return;}
    updatePUI();
    if(PM.phase==='focus'&&Math.random()<.1)spawnStar();
  },1000);
}
function pomoComplF(){
  PM.sess++;PM.min+=PM.fDur;PM.streak++;
  if(PM.streak>PM.bStreak)PM.bStreak=PM.streak;
  SAVE.totalSessions++;SAVE.totalMinutes+=PM.fDur;
  if(PM.streak>SAVE.bestStreak)SAVE.bestStreak=PM.streak;
  playS('win');

  let tip=DTIPS_D[Math.floor(Math.random()*DTIPS_D.length)];
  tip=tip.replace('{m}',PM.fDur).replace('{n}',PM.streak);
  setTip(tip);
  showAch('⭐ 無敵星星完成！',`+${PM.fDur}分 連擊×${PM.streak}`);

  // Combo
  if(PM.streak>=2){$('#pomoCombo').classList.add('show');$('#pomoComboStars').textContent='⭐'.repeat(Math.min(PM.streak,8));$('#pomoComboText').textContent=`${PM.streak} 連擊 COMBO！`;}

  // XP & Level
  const leveled = addXP(PM.fDur);
  if(leveled){
    const lu=$('#pomoLevelUp');lu.classList.add('show');
    $('#pomoLevelUpText').textContent=`🆙 Lv.${SAVE.level} — ${stageName(SAVE.level)}！`;
    setTimeout(()=>lu.classList.remove('show'),4000);
  }

  // Victory report
  genReport();
  saveSave();

  PM.phase='idle';updatePUI();
  setTimeout(()=>{if(PM.phase==='idle')pomoStartB();},1500);
}
function pomoComplB(){ playS('brk'); PM.phase='idle'; PM.rem=PM.fDur*60; PM.total=PM.fDur*60; setTip('休息結束！準備下一回合！⭐'); updatePUI(); }

function updatePUI(){
  const m=Math.floor(PM.rem/60),s=PM.rem%60;
  const ts=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  const te=$('#pomoTimeDisplay'),re=$('#pomoRingFill'),le=$('#pomoPhaseLabel'),co=$('#pomoControls'),du=$('#pomoDurSection');
  te.textContent=ts;
  const circ=2*Math.PI*105,prog=PM.total>0?PM.rem/PM.total:1;
  re.style.strokeDashoffset=circ*(1-prog);
  te.className='pomo-time';re.className='pomo-ring-fill';
  const isF=PM.phase==='focus'||PM.phase==='pf',isB=PM.phase==='break'||PM.phase==='pb';
  if(isB){te.classList.add('break-mode');re.classList.add('break-mode');}
  if(isF&&PM.rem<=30&&PM.rem>0){te.classList.add('warn');re.classList.add('warn');}
  if(PM.phase==='idle')le.innerHTML='<span class="phase-icon">⭐</span> 準備就緒';
  else if(PM.phase==='focus')le.innerHTML='<span class="phase-icon">🔥</span> 無敵星星啟動中';
  else if(PM.phase==='pf')le.innerHTML='<span class="phase-icon">⏸️</span> 暫停';
  else if(PM.phase==='break')le.innerHTML='<span class="phase-icon">☕</span> 休息中';
  else if(PM.phase==='pb')le.innerHTML='<span class="phase-icon">⏸️</span> 休息暫停';
  if(PM.phase==='idle'){co.innerHTML=`<button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">⭐ 啟動無敵星星</button>`;du.style.display='';}
  else if(PM.phase==='focus'){co.innerHTML=`<button class="pomo-btn pomo-btn-pause" onclick="pomoToggle()">⏸ 暫停</button><button class="pomo-btn pomo-btn-reset" onclick="pomoReset()">✕ 放棄</button>`;du.style.display='none';}
  else if(PM.phase==='pf'){co.innerHTML=`<button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">▶ 繼續</button><button class="pomo-btn pomo-btn-reset" onclick="pomoReset()">✕ 放棄</button>`;du.style.display='none';}
  else if(PM.phase==='break'){co.innerHTML=`<button class="pomo-btn pomo-btn-pause" onclick="pomoToggle()">⏸ 暫停</button><button class="pomo-btn pomo-btn-skip" onclick="pomoSkipB()">⏭ 跳過</button>`;du.style.display='none';}
  else if(PM.phase==='pb'){co.innerHTML=`<button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">▶ 繼續</button><button class="pomo-btn pomo-btn-skip" onclick="pomoSkipB()">⏭ 跳過</button>`;du.style.display='none';}
  $('#psS').textContent=PM.sess;$('#psM').textContent=PM.min;$('#psK').textContent=PM.bStreak;$('#psT').textContent=PM.tDone;
  $('#pomoStreakBadge').textContent=`🔥 ${PM.streak}`;
}
function setTip(h){$('#pomoDadTipText').innerHTML=h;}
function genReport(){
  const r=$('#victoryReport'); r.style.display='block';
  const stage=stageName(SAVE.level);
  const txt=`媽媽，則翰已啟動「內在驅動力」專屬密碼！\n\n🔥 今日專注 ${PM.sess} 回合（${PM.min} 分鐘）\n⭐ 連擊 ×${PM.streak}\n${stageEmoji(SAVE.level)} 目前等級：Lv.${SAVE.level} ${stage}\n\n我發揮了 100% 的超能力，主動擊落功課怪獸。\n現在我是「${stage}」狀態，準備進入我的自由領域！💪`;
  $('#victoryReportText').textContent=txt;
}
function copyReport(){
  const t=$('#victoryReportText').textContent;
  navigator.clipboard?.writeText(t).then(()=>{showAch('📋 已複製！','傳給媽媽看吧 💚');}).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showAch('📋 已複製！','傳給媽媽看吧 💚');
  });
}

// Tasks
function addTask(){const i=$('#pomoTaskInput'),t=i.value.trim();if(!t)return;PM.tasks.push({text:t,done:false,id:Date.now()});i.value='';renderTasks();}
function togTask(id){const t=PM.tasks.find(t=>t.id===id);if(t){t.done=!t.done;if(t.done){PM.tDone++;SAVE.totalTasks++;saveSave();playS('task');}else{PM.tDone=Math.max(0,PM.tDone-1);}renderTasks();updatePUI();}}
function delTask(id){PM.tasks=PM.tasks.filter(t=>t.id!==id);renderTasks();}
function renderTasks(){const l=$('#pomoTaskList');l.innerHTML='';PM.tasks.forEach(t=>{const li=document.createElement('li');li.className=`pomo-task-item ${t.done?'done':''}`;li.innerHTML=`<button class="pomo-task-check" onclick="togTask(${t.id})">${t.done?'✓':''}</button><span class="pomo-task-text">${t.text}</span><button class="pomo-task-del" onclick="delTask(${t.id})">×</button>`;l.appendChild(li);});}
function spawnStar(){const w=$('#pomoRingWrap');if(!w)return;const p=document.createElement('div');p.className='star-particle';const a=Math.random()*Math.PI*2,d=80+Math.random()*40;p.style.left=(110+Math.cos(a)*55)+'px';p.style.top=(110+Math.sin(a)*55)+'px';p.style.setProperty('--tx',`${Math.cos(a)*d}px`);p.style.setProperty('--ty',`${Math.sin(a)*d}px`);w.appendChild(p);requestAnimationFrame(()=>p.classList.add('active'));setTimeout(()=>p.remove(),2000);}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===$('#pomoTaskInput'))addTask();});

// ==================== SOUND ====================
function getAC(){if(!PM.audioCtx)PM.audioCtx=new(window.AudioContext||window.webkitAudioContext)();return PM.audioCtx;}
function playS(type){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
if(type==='win'){o.type='sine';g.gain.setValueAtTime(.3,c.currentTime);[523.25,659.25,783.99,1046.5].forEach((f,i)=>o.frequency.setValueAtTime(f,c.currentTime+i*.15));g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.8);o.start(c.currentTime);o.stop(c.currentTime+.8);}
else if(type==='brk'){o.type='triangle';o.frequency.setValueAtTime(440,c.currentTime);o.frequency.setValueAtTime(550,c.currentTime+.1);g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.5);o.start(c.currentTime);o.stop(c.currentTime+.5);}
else if(type==='task'){o.type='sine';o.frequency.setValueAtTime(880,c.currentTime);g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.2);o.start(c.currentTime);o.stop(c.currentTime+.2);}
}catch(e){}}

// ==================== UTILITIES ====================
function dl(ms){return new Promise(r=>setTimeout(r,ms))}
function scrollB(){const a=$('#dialogueArea');if(a)setTimeout(()=>a.scrollTop=a.scrollHeight,50)}
function showAch(title,desc){
  if(!title){const t=['🧬 身世解密！','🎖️ 超能力解鎖！','💎 資源層級！','⭐ Ikigai！','⚔️ 燃料保衛戰！','🔮 內在探索！','📜 專屬任務！'];title=t[GS.chapter-1]||'成就解鎖！';desc=`洞察 +${GS.insights}`;}
  const a=$('#achievement');$('#achText').innerHTML=`<strong>${title}</strong>${desc||''}`;a.classList.add('show');setTimeout(()=>a.classList.remove('show'),2500);
}

// Stars bg
(function(){const bg=$('#starsBg');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';s.style.width=s.style.height=(Math.random()*2+1)+'px';bg.appendChild(s);}})();

// Init
loadSave();
</script>
