<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>專注力 Power Up！— 父子冒險對話</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap');

:root {
  --bg-dark: #0a0e1a;
  --bg-panel: #111827;
  --bg-card: #1e2740;
  --accent-green: #39ff14;
  --accent-cyan: #00e5ff;
  --accent-yellow: #ffe600;
  --accent-orange: #ff9100;
  --accent-pink: #ff4081;
  --accent-purple: #b388ff;
  --text-main: #e8eaf6;
  --text-dim: #7986cb;
  --border-glow: rgba(57, 255, 20, 0.3);
  --ikigai-love: #ff4081;
  --ikigai-good: #00e5ff;
  --ikigai-need: #ffe600;
  --ikigai-pay: #39ff14;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === SCANLINE OVERLAY === */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* === GAME CONTAINER === */
#game {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* === SCREENS === */
.screen {
  display: none;
  padding: 16px;
  min-height: 100vh;
  animation: fadeIn 0.5s ease;
}
.screen.active { display: flex; flex-direction: column; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === TITLE SCREEN === */
#title-screen {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(ellipse at 50% 30%, rgba(57,255,20,0.08) 0%, transparent 70%);
}

.title-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent-green);
  text-shadow: 0 0 20px var(--accent-green), 0 0 40px rgba(57,255,20,0.3);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.title-main {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.3;
  margin-bottom: 12px;
}

.title-sub {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 40px;
  line-height: 1.6;
}

.pixel-dad {
  font-size: 64px;
  margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* === BUTTONS === */
.btn {
  display: inline-block;
  padding: 14px 32px;
  border: 2px solid var(--accent-green);
  background: rgba(57,255,20,0.1);
  color: var(--accent-green);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 18px;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover, .btn:active {
  background: rgba(57,255,20,0.25);
  box-shadow: 0 0 20px rgba(57,255,20,0.3);
  transform: scale(1.03);
}

.btn-choice {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin: 6px 0;
  border: 2px solid var(--bg-card);
  background: var(--bg-card);
  color: var(--text-main);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 400;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
.btn-choice:hover, .btn-choice:active {
  border-color: var(--accent-cyan);
  background: rgba(0,229,255,0.08);
}
.btn-choice .choice-icon {
  margin-right: 8px;
  font-size: 18px;
}

.btn-next {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: 2px solid var(--accent-green);
  background: linear-gradient(135deg, rgba(57,255,20,0.15), rgba(0,229,255,0.1));
  color: var(--accent-green);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.btn-next:hover { box-shadow: 0 0 20px rgba(57,255,20,0.3); }

/* === DIALOGUE === */
.dialogue-area {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 8px;
}

.msg {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  animation: msgIn 0.4s ease;
}
.msg.dad { flex-direction: row; }
.msg.kid { flex-direction: row-reverse; }
.msg.narrator { justify-content: center; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 2px solid;
}
.msg.dad .msg-avatar {
  background: rgba(57,255,20,0.1);
  border-color: var(--accent-green);
}
.msg.kid .msg-avatar {
  background: rgba(0,229,255,0.1);
  border-color: var(--accent-cyan);
}

.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 14px;
  line-height: 1.7;
  font-size: 15px;
}
.msg.dad .msg-bubble {
  background: var(--bg-card);
  border: 1px solid rgba(57,255,20,0.15);
  border-radius: 14px 14px 14px 4px;
}
.msg.kid .msg-bubble {
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 14px 14px 4px 14px;
}
.msg.narrator .msg-bubble {
  max-width: 90%;
  background: linear-gradient(135deg, rgba(179,136,255,0.1), rgba(255,64,129,0.08));
  border: 1px dashed var(--accent-purple);
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  color: var(--accent-purple);
  padding: 14px 20px;
}

.msg-bubble strong { color: var(--accent-yellow); }
.msg-bubble em { color: var(--accent-cyan); font-style: normal; }
.msg-bubble .highlight-green { color: var(--accent-green); font-weight: 700; }
.msg-bubble .highlight-pink { color: var(--accent-pink); font-weight: 700; }

/* === CHOICE AREA === */
.choice-area {
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

/* === CHAPTER HEADER === */
.chapter-header {
  text-align: center;
  padding: 20px 0 14px;
  margin-bottom: 10px;
}
.chapter-num {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent-green);
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.chapter-title {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(90deg, var(--accent-yellow), var(--accent-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* === STATS BAR === */
.stats-bar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-panel);
  border-radius: 10px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}
.stat-item {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
}
.stat-val {
  font-size: 18px;
  font-weight: 900;
  display: block;
  margin-bottom: 2px;
}
.stat-val.green { color: var(--accent-green); }
.stat-val.cyan { color: var(--accent-cyan); }
.stat-val.yellow { color: var(--accent-yellow); }
.stat-val.pink { color: var(--accent-pink); }

/* === INTERACTIVE WIDGETS === */
.widget-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 16px;
  margin: 10px 0;
}

.resource-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0;
  padding: 10px 14px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s;
  border: 2px solid transparent;
}
.resource-bar:hover, .resource-bar.selected {
  border-color: var(--accent-cyan);
  background: rgba(0,229,255,0.05);
}
.resource-icon { font-size: 28px; }
.resource-info { flex: 1; }
.resource-name { font-weight: 700; font-size: 16px; }
.resource-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.resource-rank {
  font-family: 'Press Start 2P', monospace;
  font-size: 20px;
  color: var(--accent-yellow);
}

/* === IKIGAI WHEEL === */
.ikigai-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 0;
}
.ikigai-card {
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  border: 2px solid transparent;
}
.ikigai-card:hover { transform: scale(1.03); }
.ikigai-card.love {
  background: rgba(255,64,129,0.1);
  border-color: rgba(255,64,129,0.3);
}
.ikigai-card.good {
  background: rgba(0,229,255,0.1);
  border-color: rgba(0,229,255,0.3);
}
.ikigai-card.need {
  background: rgba(255,230,0,0.08);
  border-color: rgba(255,230,0,0.3);
}
.ikigai-card.pay {
  background: rgba(57,255,20,0.08);
  border-color: rgba(57,255,20,0.3);
}
.ikigai-card.active {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}
.ikigai-icon { font-size: 32px; display: block; margin-bottom: 6px; }
.ikigai-label { font-size: 14px; font-weight: 700; }
.ikigai-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* === THOUGHT BUBBLE === */
.thought-input-area {
  margin: 10px 0;
}
.thought-input {
  width: 100%;
  padding: 14px;
  background: var(--bg-card);
  border: 2px solid rgba(0,229,255,0.3);
  border-radius: 12px;
  color: var(--text-main);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  resize: none;
  outline: none;
  min-height: 60px;
}
.thought-input::placeholder { color: var(--text-dim); }
.thought-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,229,255,0.15); }

/* === PROGRESS === */
.progress-bar-wrap {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  margin-bottom: 12px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* === REWARD CARD === */
.reward-card {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid var(--accent-yellow);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin: 14px 0;
  position: relative;
  overflow: hidden;
}
.reward-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(transparent, rgba(255,230,0,0.05), transparent, rgba(57,255,20,0.05), transparent);
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.reward-card > * { position: relative; z-index: 1; }
.reward-icon { font-size: 48px; margin-bottom: 8px; }
.reward-title { font-size: 18px; font-weight: 900; color: var(--accent-yellow); margin-bottom: 4px; }
.reward-desc { font-size: 13px; color: var(--text-dim); }

/* === MINI MAP === */
.mini-map {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 10px 0;
}
.map-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: all 0.3s;
}
.map-dot.done { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.map-dot.current { background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); animation: pulse 1.5s infinite; }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.4); }
}

/* === TYPING INDICATOR === */
.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 8px 14px;
  background: var(--bg-card);
  border-radius: 14px;
  margin: 6px 0;
}
.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* === ACHIEVEMENT TOAST === */
.achievement {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid var(--accent-yellow);
  border-radius: 12px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10000;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.achievement.show { transform: translateX(-50%) translateY(0); }
.achievement-icon { font-size: 28px; }
.achievement-text { font-size: 13px; }
.achievement-text strong { color: var(--accent-yellow); display: block; font-size: 14px; }

/* === COMPARISON TABLE === */
.compare-table {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 0;
}
.compare-col {
  padding: 14px;
  border-radius: 12px;
  text-align: center;
}
.compare-col.bad {
  background: rgba(255,64,129,0.08);
  border: 1px solid rgba(255,64,129,0.2);
}
.compare-col.good {
  background: rgba(57,255,20,0.08);
  border: 1px solid rgba(57,255,20,0.2);
}
.compare-col h4 { font-size: 15px; margin-bottom: 8px; }
.compare-col.bad h4 { color: var(--accent-pink); }
.compare-col.good h4 { color: var(--accent-green); }
.compare-col ul {
  list-style: none;
  text-align: left;
  font-size: 13px;
  color: var(--text-dim);
}
.compare-col li {
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.compare-col li:last-child { border: none; }

/* === SCROLL === */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* === EXPLORATION JOURNAL === */
.journal-entry {
  background: rgba(255,230,0,0.04);
  border-left: 3px solid var(--accent-yellow);
  padding: 12px 14px;
  margin: 8px 0;
  border-radius: 0 10px 10px 0;
  font-size: 14px;
}
.journal-entry .j-label {
  font-size: 11px;
  color: var(--accent-yellow);
  font-weight: 700;
  margin-bottom: 4px;
}

/* === TIMER WIDGET === */
.timer-display {
  font-family: 'Press Start 2P', monospace;
  font-size: 36px;
  color: var(--accent-green);
  text-align: center;
  padding: 20px;
  text-shadow: 0 0 20px var(--accent-green);
  background: rgba(0,0,0,0.4);
  border-radius: 12px;
  margin: 10px 0;
}

/* Stars bg */
.stars-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.8; }
}
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="achievement" id="achievement">
  <div class="achievement-icon" id="achIcon">🏆</div>
  <div class="achievement-text" id="achText"><strong>成就解鎖！</strong>繼續探索吧</div>
</div>

<div id="game">

  <!-- TITLE SCREEN -->
  <div class="screen active" id="title-screen">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
      <div class="pixel-dad">🦸‍♂️</div>
      <div class="title-logo">★ POWER UP ★</div>
      <div class="title-main">專注力<br>大冒險</div>
      <div class="title-sub">一場父子之間的<br>內在探索對話 🎮</div>
      <button class="btn" onclick="startGame()">▶ 開始冒險</button>
    </div>
  </div>

  <!-- GAME SCREEN (dynamic) -->
  <div class="screen" id="game-screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
    <div class="mini-map" id="miniMap"></div>
    <div class="dialogue-area" id="dialogueArea"></div>
    <div class="choice-area" id="choiceArea"></div>
  </div>

</div>

<script>
// ============================================
// GAME ENGINE
// ============================================
const STATE = {
  chapter: 0,
  step: 0,
  insights: 0,
  stars: 0,
  freePoints: 0,
  journal: [],
  answers: {},
  totalChapters: 7
};

const CHAPTERS = [
  // CH0: 開場 - 靈魂拷問
  {
    title: '靈魂拷問',
    subtitle: '你有沒有中了「假裝努力」的魔法？',
    scenes: [
      { type: 'narrator', text: '🌙 晚上九點，書房裡的檯燈亮著...' },
      { type: 'dad', text: '嘿，寶貝，寫功課寫得怎麼樣了？', delay: 800 },
      { type: 'kid', text: '嗯...我有在寫啊...', delay: 600 },
      { type: 'dad', text: '爸爸問你一個問題喔。你覺得，坐在書桌前面一個小時，就等於「很認真」嗎？', delay: 800 },
      {
        type: 'choice',
        text: '你覺得呢？',
        choices: [
          { icon: '🤔', text: '對啊，坐很久就是很認真', value: 'fake' },
          { icon: '💡', text: '好像不一定耶...', value: 'aware' },
          { icon: '😅', text: '老實說...有時候我會發呆', value: 'honest' }
        ],
        onChoice: (val) => {
          STATE.answers.effort = val;
          if (val === 'honest') { STATE.insights++; STATE.stars++; }
          if (val === 'aware') STATE.insights++;
        }
      },
      { type: 'dad', text: '爸爸跟你說一個秘密——', delay: 600 },
      { type: 'dad', text: '很多大人也會中一種叫做<strong>「假裝努力」</strong>的魔法。😱', delay: 800 },
      { type: 'dad', text: '就是看起來很忙，坐在那裡好久好久，但腦袋其實在放空、在想別的事情。', delay: 800 },
      { type: 'dad', text: '這樣的一個小時，跟<em>真正專心</em>的 30 分鐘比起來——你覺得哪個比較厲害？', delay: 800 },
      {
        type: 'choice',
        text: '',
        choices: [
          { icon: '⚡', text: '專心的 30 分鐘！', value: 'focus' },
          { icon: '⏰', text: '坐比較久的？', value: 'time' },
        ],
        onChoice: (val) => {
          STATE.answers.focus_vs_time = val;
          if (val === 'focus') { STATE.insights++; STATE.stars++; }
        }
      },
      {
        type: 'dad',
        text: () => STATE.answers.focus_vs_time === 'focus'
          ? '沒錯！你很聰明！<span class="highlight-green">專注 30 分鐘</span>打趴發呆 3 小時！這就是爸爸今天要告訴你的超級祕密。'
          : '其實啊，<span class="highlight-green">專心的 30 分鐘</span>比發呆 3 小時還要更厲害唷！這就是今天爸爸想跟你分享的超級祕密。',
        delay: 600
      },
      { type: 'narrator', text: '💡 洞察 +1：原來「認真」不是比誰坐得久！' },

// RENDER ENGINE
// ============================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
let sceneIndex = 0;
let isAnimating = false;

function showScreen(id) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $(`#${id}`).classList.add('active');
}

function startGame() {
  showScreen('game-screen');
  STATE.chapter = 0;
  sceneIndex = 0;
  renderMiniMap();
  playChapter();
}

function renderMiniMap() {
  const map = $('#miniMap');
  map.innerHTML = '';
  for (let i = 0; i < STATE.totalChapters; i++) {
    const dot = document.createElement('div');
    dot.className = 'map-dot';
    if (i < STATE.chapter) dot.classList.add('done');
    if (i === STATE.chapter) dot.classList.add('current');
    map.appendChild(dot);
  }
  $('#progressBar').style.width = `${(STATE.chapter / STATE.totalChapters) * 100}%`;
}

async function playChapter() {
  const chapter = CHAPTERS[STATE.chapter];
  if (!chapter) return;
  const area = $('#dialogueArea');
  const choiceArea = $('#choiceArea');
  area.innerHTML = '';
  choiceArea.innerHTML = '';
  sceneIndex = 0;
  await playNextScene();
}

async function playNextScene() {
  const chapter = CHAPTERS[STATE.chapter];
  if (!chapter || sceneIndex >= chapter.scenes.length) return;

  const scene = chapter.scenes[sceneIndex];
  const area = $('#dialogueArea');
  const choiceArea = $('#choiceArea');

  switch (scene.type) {
    case 'chapter':
      area.innerHTML += `
        <div class="chapter-header" style="animation: fadeIn 0.6s ease">
          <div class="chapter-num">${scene.num}</div>
          <div class="chapter-title">${scene.title}</div>
        </div>`;
      sceneIndex++;
      await delay(400);
      await playNextScene();
      break;

    case 'narrator':
      area.innerHTML += `
        <div class="msg narrator" style="animation: msgIn 0.4s ease">
          <div class="msg-bubble">${scene.text}</div>
        </div>`;
      scrollToBottom();
      sceneIndex++;
      await delay(scene.delay || 500);
      await playNextScene();
      break;

    case 'dad':
    case 'kid': {
      // Show typing
      const typingId = `typing-${Date.now()}`;
      area.innerHTML += `
        <div class="msg ${scene.type}" id="${typingId}">
          <div class="msg-avatar">${scene.type === 'dad' ? '👨' : '👦'}</div>
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>`;
      scrollToBottom();
      await delay(scene.delay || 600);

      const text = typeof scene.text === 'function' ? scene.text() : scene.text;
      const el = document.getElementById(typingId);
      if (el) {
        el.innerHTML = `
          <div class="msg-avatar">${scene.type === 'dad' ? '👨' : '👦'}</div>
          <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
      }
      scrollToBottom();
      sceneIndex++;
      await delay(300);
      await playNextScene();
      break;
    }

    case 'choice':
      choiceArea.innerHTML = '';
      if (scene.text) {
        choiceArea.innerHTML += `<div style="font-size:13px; color:var(--text-dim); margin-bottom:6px; text-align:center;">${scene.text}</div>`;
      }
      scene.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn-choice';
        btn.innerHTML = `<span class="choice-icon">${c.icon}</span> ${c.text}`;
        btn.onclick = () => {
          if (isAnimating) return;
          isAnimating = true;
          if (scene.onChoice) scene.onChoice(c.value);
          // Show kid's response
          area.innerHTML += `
            <div class="msg kid" style="animation: msgIn 0.4s ease">
              <div class="msg-avatar">👦</div>
              <div class="msg-bubble">${c.text}</div>
            </div>`;
          choiceArea.innerHTML = '';
          scrollToBottom();
          sceneIndex++;
          setTimeout(async () => {
            isAnimating = false;
            await playNextScene();
          }, 500);
        };
        choiceArea.appendChild(btn);
      });
      scrollToBottom();
      break;

    case 'input': {
      choiceArea.innerHTML = `
        <div class="thought-input-area">
          <div style="font-size:13px; color:var(--text-dim); margin-bottom:6px;">${scene.prompt}</div>
          <textarea class="thought-input" id="thoughtInput" placeholder="在這裡寫下你的想法..." rows="2"></textarea>
          <button class="btn-next" id="submitThought" style="margin-top:8px;">✏️ 寫好了</button>
        </div>`;
      scrollToBottom();
      $('#submitThought').onclick = () => {
        const val = $('#thoughtInput').value.trim() || '（還在想...）';
        STATE.answers[scene.key] = val;
        STATE.journal.push({ label: scene.prompt, value: val });
        area.innerHTML += `
          <div class="msg kid" style="animation: msgIn 0.4s ease">
            <div class="msg-avatar">👦</div>
            <div class="msg-bubble">${val}</div>
          </div>`;
        choiceArea.innerHTML = '';
        scrollToBottom();
        sceneIndex++;
        setTimeout(() => playNextScene(), 500);
      };
      break;
    }

    case 'widget':
      renderWidget(scene.widget, area);
      scrollToBottom();
      sceneIndex++;
      await delay(600);
      await playNextScene();
      break;

    case 'next':
      choiceArea.innerHTML = `<button class="btn-next" id="nextChapter">${scene.text}</button>`;
      scrollToBottom();
      $('#nextChapter').onclick = () => {
        STATE.chapter++;
        renderMiniMap();
        choiceArea.innerHTML = '';
        sceneIndex = 0;
        showAchievement();
        setTimeout(() => playChapter(), 300);
      };
      break;
  }
}

function scrollToBottom() {
  const area = $('#dialogueArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function showAchievement() {
  const titles = [
    '🎯 靈魂拷問完成！',
    '💎 資源層級解鎖！',
    '🏧 自由點數開通！',
    '⭐ Ikigai 地圖展開！',
    '⚔️ 實戰手冊入手！',
    '🔮 內在探索完成！',
    '👑 全部通關！'
  ];
  const ach = $('#achievement');
  $('#achText').innerHTML = `<strong>${titles[STATE.chapter - 1] || '成就解鎖！'}</strong>洞察力 +${STATE.insights}`;
  ach.classList.add('show');
  setTimeout(() => ach.classList.remove('show'), 2500);
}

function startMiniTimer() {
  let sec = 10;
  const display = $('#timerDisplay');
  if (!display) return;
  const interval = setInterval(() => {
    sec--;
    display.textContent = `00:${sec.toString().padStart(2, '0')}`;
    if (sec <= 3) display.style.color = 'var(--accent-pink)';
    if (sec <= 0) {
      clearInterval(interval);
      display.textContent = '⭐ 完成！';
      display.style.color = 'var(--accent-yellow)';
      setTimeout(() => {
        display.textContent = '15:00';
        display.style.color = 'var(--accent-green)';
      }, 2000);
    }
  }, 1000);
}

// Generate stars background
(function initStars() {
  const bg = $('#starsBg');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
    bg.appendChild(s);
  }
})();
</script>
