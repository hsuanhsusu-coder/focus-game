<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>專注力 Power Up！— 父子冒險對話</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap');

:root {
  --bg-dark: #0a0e1a;
  --bg-panel: #111827;
  --bg-card: #1e2740;
  --accent-green: #39ff14;
  --accent-cyan: #00e5ff;
  --accent-yellow: #ffe600;
  --accent-orange: #ff9100;
  --accent-pink: #ff4081;
  --accent-purple: #b388ff;
  --text-main: #e8eaf6;
  --text-dim: #7986cb;
  --border-glow: rgba(57, 255, 20, 0.3);
  --ikigai-love: #ff4081;
  --ikigai-good: #00e5ff;
  --ikigai-need: #ffe600;
  --ikigai-pay: #39ff14;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
  z-index: 9999;
}

#game {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.screen {
  display: none;
  padding: 16px;
  min-height: 100vh;
  animation: fadeIn 0.5s ease;
}
.screen.active { display: flex; flex-direction: column; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === TITLE === */
#title-screen {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(ellipse at 50% 30%, rgba(57,255,20,0.08) 0%, transparent 70%);
}
.title-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent-green);
  text-shadow: 0 0 20px var(--accent-green), 0 0 40px rgba(57,255,20,0.3);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.title-main {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.3;
  margin-bottom: 12px;
}
.title-sub {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 32px;
  line-height: 1.6;
}
.pixel-dad {
  font-size: 64px;
  margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.title-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 280px;
}

/* === BUTTONS === */
.btn {
  display: inline-block;
  padding: 14px 32px;
  border: 2px solid var(--accent-green);
  background: rgba(57,255,20,0.1);
  color: var(--accent-green);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 18px;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover, .btn:active {
  background: rgba(57,255,20,0.25);
  box-shadow: 0 0 20px rgba(57,255,20,0.3);
  transform: scale(1.03);
}

.btn-tomato {
  display: inline-block;
  padding: 14px 32px;
  border: 2px solid var(--accent-orange);
  background: rgba(255,145,0,0.1);
  color: var(--accent-orange);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 18px;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.btn-tomato:hover, .btn-tomato:active {
  background: rgba(255,145,0,0.25);
  box-shadow: 0 0 20px rgba(255,145,0,0.3);
  transform: scale(1.03);
}

.btn-choice {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin: 6px 0;
  border: 2px solid var(--bg-card);
  background: var(--bg-card);
  color: var(--text-main);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 400;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
.btn-choice:hover, .btn-choice:active {
  border-color: var(--accent-cyan);
  background: rgba(0,229,255,0.08);
}
.btn-choice .choice-icon { margin-right: 8px; font-size: 18px; }

.btn-next {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: 2px solid var(--accent-green);
  background: linear-gradient(135deg, rgba(57,255,20,0.15), rgba(0,229,255,0.1));
  color: var(--accent-green);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.btn-next:hover { box-shadow: 0 0 20px rgba(57,255,20,0.3); }

/* === DIALOGUE === */
.dialogue-area { flex: 1; overflow-y: auto; padding-bottom: 8px; }

.msg { display: flex; gap: 10px; margin-bottom: 14px; animation: msgIn 0.4s ease; }
.msg.dad { flex-direction: row; }
.msg.kid { flex-direction: row-reverse; }
.msg.narrator { justify-content: center; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; border: 2px solid;
}
.msg.dad .msg-avatar { background: rgba(57,255,20,0.1); border-color: var(--accent-green); }
.msg.kid .msg-avatar { background: rgba(0,229,255,0.1); border-color: var(--accent-cyan); }

.msg-bubble {
  max-width: 80%; padding: 12px 16px; border-radius: 14px;
  line-height: 1.7; font-size: 15px;
}
.msg.dad .msg-bubble { background: var(--bg-card); border: 1px solid rgba(57,255,20,0.15); border-radius: 14px 14px 14px 4px; }
.msg.kid .msg-bubble { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); border-radius: 14px 14px 4px 14px; }
.msg.narrator .msg-bubble {
  max-width: 90%; background: linear-gradient(135deg, rgba(179,136,255,0.1), rgba(255,64,129,0.08));
  border: 1px dashed var(--accent-purple); border-radius: 12px;
  text-align: center; font-size: 14px; color: var(--accent-purple); padding: 14px 20px;
}

.msg-bubble strong { color: var(--accent-yellow); }
.msg-bubble em { color: var(--accent-cyan); font-style: normal; }
.msg-bubble .highlight-green { color: var(--accent-green); font-weight: 700; }
.msg-bubble .highlight-pink { color: var(--accent-pink); font-weight: 700; }

.choice-area { padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }

.chapter-header { text-align: center; padding: 20px 0 14px; margin-bottom: 10px; }
.chapter-num { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent-green); letter-spacing: 3px; margin-bottom: 6px; }
.chapter-title {
  font-size: 22px; font-weight: 900;
  background: linear-gradient(90deg, var(--accent-yellow), var(--accent-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.stats-bar {
  display: flex; gap: 8px; padding: 8px 12px;
  background: var(--bg-panel); border-radius: 10px; margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}
.stat-item { flex: 1; text-align: center; font-size: 11px; color: var(--text-dim); }
.stat-val { font-size: 18px; font-weight: 900; display: block; margin-bottom: 2px; }
.stat-val.green { color: var(--accent-green); }
.stat-val.cyan { color: var(--accent-cyan); }
.stat-val.yellow { color: var(--accent-yellow); }
.stat-val.pink { color: var(--accent-pink); }

.widget-card {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 16px; margin: 10px 0;
}

.resource-bar {
  display: flex; align-items: center; gap: 10px; margin: 8px 0;
  padding: 10px 14px; background: rgba(0,0,0,0.3); border-radius: 10px;
  cursor: pointer; transition: all 0.3s; border: 2px solid transparent;
}
.resource-bar:hover, .resource-bar.selected { border-color: var(--accent-cyan); background: rgba(0,229,255,0.05); }
.resource-icon { font-size: 28px; }
.resource-info { flex: 1; }
.resource-name { font-weight: 700; font-size: 16px; }
.resource-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.resource-rank { font-family: 'Press Start 2P', monospace; font-size: 20px; color: var(--accent-yellow); }

.ikigai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.ikigai-card {
  padding: 14px; border-radius: 12px; text-align: center;
  cursor: pointer; transition: all 0.3s; border: 2px solid transparent;
}
.ikigai-card:hover { transform: scale(1.03); }
.ikigai-card.love { background: rgba(255,64,129,0.1); border-color: rgba(255,64,129,0.3); }
.ikigai-card.good { background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.3); }
.ikigai-card.need { background: rgba(255,230,0,0.08); border-color: rgba(255,230,0,0.3); }
.ikigai-card.pay { background: rgba(57,255,20,0.08); border-color: rgba(57,255,20,0.3); }
.ikigai-icon { font-size: 32px; display: block; margin-bottom: 6px; }
.ikigai-label { font-size: 14px; font-weight: 700; }
.ikigai-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

.thought-input {
  width: 100%; padding: 14px; background: var(--bg-card);
  border: 2px solid rgba(0,229,255,0.3); border-radius: 12px;
  color: var(--text-main); font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px; resize: none; outline: none; min-height: 60px;
}
.thought-input::placeholder { color: var(--text-dim); }
.thought-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,229,255,0.15); }

.progress-bar-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); border-radius: 2px; transition: width 0.5s ease; }

.reward-card {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid var(--accent-yellow); border-radius: 16px;
  padding: 20px; text-align: center; margin: 14px 0; position: relative; overflow: hidden;
}
.reward-card::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(transparent, rgba(255,230,0,0.05), transparent, rgba(57,255,20,0.05), transparent);
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.reward-card > * { position: relative; z-index: 1; }
.reward-icon { font-size: 48px; margin-bottom: 8px; }
.reward-title { font-size: 18px; font-weight: 900; color: var(--accent-yellow); margin-bottom: 4px; }
.reward-desc { font-size: 13px; color: var(--text-dim); }

.mini-map { display: flex; justify-content: center; gap: 6px; padding: 10px 0; }
.map-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.3s; }
.map-dot.done { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.map-dot.current { background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.4); } }

.typing-indicator { display: inline-flex; gap: 4px; padding: 8px 14px; background: var(--bg-card); border-radius: 14px; margin: 6px 0; }
.typing-indicator span { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: typingBounce 1.2s infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.achievement {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid var(--accent-yellow);
  border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 10px;
  z-index: 10000; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.achievement.show { transform: translateX(-50%) translateY(0); }
.achievement-icon { font-size: 28px; }
.achievement-text { font-size: 13px; }
.achievement-text strong { color: var(--accent-yellow); display: block; font-size: 14px; }

.compare-table { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.compare-col { padding: 14px; border-radius: 12px; text-align: center; }
.compare-col.bad { background: rgba(255,64,129,0.08); border: 1px solid rgba(255,64,129,0.2); }
.compare-col.good { background: rgba(57,255,20,0.08); border: 1px solid rgba(57,255,20,0.2); }
.compare-col h4 { font-size: 15px; margin-bottom: 8px; }
.compare-col.bad h4 { color: var(--accent-pink); }
.compare-col.good h4 { color: var(--accent-green); }
.compare-col ul { list-style: none; text-align: left; font-size: 13px; color: var(--text-dim); }
.compare-col li { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.compare-col li:last-child { border: none; }

.journal-entry {
  background: rgba(255,230,0,0.04); border-left: 3px solid var(--accent-yellow);
  padding: 12px 14px; margin: 8px 0; border-radius: 0 10px 10px 0; font-size: 14px;
}
.journal-entry .j-label { font-size: 11px; color: var(--accent-yellow); font-weight: 700; margin-bottom: 4px; }

.timer-display {
  font-family: 'Press Start 2P', monospace; font-size: 36px; color: var(--accent-green);
  text-align: center; padding: 20px; text-shadow: 0 0 20px var(--accent-green);
  background: rgba(0,0,0,0.4); border-radius: 12px; margin: 10px 0;
}

.stars-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: -1; overflow: hidden; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* =============================================
   POMODORO TIMER SCREEN
   ============================================= */
#pomo-screen {
  padding: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(255,145,0,0.06) 0%, transparent 60%);
}

.pomo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.pomo-back {
  background: none; border: none; color: var(--text-dim);
  font-size: 14px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  padding: 6px 10px; border-radius: 8px; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.pomo-back:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
.pomo-header-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--accent-orange);
  letter-spacing: 1px;
}
.pomo-streak-badge {
  font-size: 13px; color: var(--accent-yellow);
  font-weight: 700;
}

.pomo-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px;
  overflow-y: auto;
}

/* Ring Timer */
.pomo-ring-wrap {
  position: relative;
  width: 240px; height: 240px;
  margin: 10px auto 16px;
}
.pomo-ring-svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.pomo-ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 8;
}
.pomo-ring-fill {
  fill: none;
  stroke: var(--accent-green);
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
  filter: drop-shadow(0 0 8px var(--accent-green));
}
.pomo-ring-fill.break-mode {
  stroke: var(--accent-cyan);
  filter: drop-shadow(0 0 8px var(--accent-cyan));
}
.pomo-ring-fill.warn {
  stroke: var(--accent-pink);
  filter: drop-shadow(0 0 12px var(--accent-pink));
}

.pomo-ring-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.pomo-time {
  font-family: 'Press Start 2P', monospace;
  font-size: 32px;
  color: var(--accent-green);
  text-shadow: 0 0 15px rgba(57,255,20,0.5);
  transition: color 0.5s;
}
.pomo-time.break-mode { color: var(--accent-cyan); text-shadow: 0 0 15px rgba(0,229,255,0.5); }
.pomo-time.warn { color: var(--accent-pink); text-shadow: 0 0 15px rgba(255,64,129,0.5); animation: pulse 1s infinite; }

.pomo-phase-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 6px;
  font-weight: 700;
}
.pomo-phase-label .phase-icon { font-size: 18px; vertical-align: middle; margin-right: 4px; }

/* Star particles during focus */
.pomo-ring-wrap .star-particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--accent-yellow);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
}
.pomo-ring-wrap .star-particle.active {
  animation: starFloat 2s ease-out forwards;
}
@keyframes starFloat {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

/* Controls */
.pomo-controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 10px 0 16px;
}
.pomo-btn {
  padding: 12px 28px;
  border: 2px solid;
  border-radius: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.pomo-btn-start {
  border-color: var(--accent-green);
  background: rgba(57,255,20,0.12);
  color: var(--accent-green);
}
.pomo-btn-start:hover { background: rgba(57,255,20,0.25); box-shadow: 0 0 15px rgba(57,255,20,0.3); }

.pomo-btn-pause {
  border-color: var(--accent-yellow);
  background: rgba(255,230,0,0.1);
  color: var(--accent-yellow);
}
.pomo-btn-pause:hover { background: rgba(255,230,0,0.2); }

.pomo-btn-reset {
  border-color: var(--accent-pink);
  background: rgba(255,64,129,0.08);
  color: var(--accent-pink);
}
.pomo-btn-reset:hover { background: rgba(255,64,129,0.15); }

.pomo-btn-skip {
  border-color: var(--accent-cyan);
  background: rgba(0,229,255,0.08);
  color: var(--accent-cyan);
}

/* Duration Picker */
.pomo-duration-section {
  margin-bottom: 16px;
}
.pomo-section-label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pomo-duration-options {
  display: flex;
  gap: 8px;
}
.pomo-dur-btn {
  flex: 1;
  padding: 10px 0;
  border: 2px solid rgba(255,255,255,0.1);
  background: var(--bg-card);
  border-radius: 10px;
  color: var(--text-main);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.pomo-dur-btn.active {
  border-color: var(--accent-orange);
  background: rgba(255,145,0,0.12);
  color: var(--accent-orange);
  box-shadow: 0 0 10px rgba(255,145,0,0.15);
}
.pomo-dur-btn span { font-size: 11px; color: var(--text-dim); display: block; margin-top: 2px; }

/* Task Notepad */
.pomo-tasks-section {
  margin-bottom: 16px;
}
.pomo-task-list {
  list-style: none;
}
.pomo-task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-card);
  border-radius: 10px;
  margin-bottom: 6px;

<body>

<script>

];

// ============================================
// CHAPTERS (same as before - abbreviated for readability)
// ============================================
const CHAPTERS = [
  // CH0: 開場
  {
    title: '靈魂拷問', subtitle: '你有沒有中了「假裝努力」的魔法？',
    scenes: [
      { type: 'narrator', text: '🌙 晚上九點，書房裡的檯燈亮著...' },
      { type: 'dad', text: '嘿，寶貝，寫功課寫得怎麼樣了？', delay: 800 },
      { type: 'kid', text: '嗯...我有在寫啊...', delay: 600 },
      { type: 'dad', text: '爸爸問你一個問題喔。你覺得，坐在書桌前面一個小時，就等於「很認真」嗎？', delay: 800 },
      { type: 'choice', text: '你覺得呢？', choices: [
        { icon: '🤔', text: '對啊，坐很久就是很認真', value: 'fake' },
        { icon: '💡', text: '好像不一定耶...', value: 'aware' },

      ], onChoice: (v) => { STATE.answers.effort = v; if (v==='honest'){STATE.insights++;STATE.stars++;} if(v==='aware')STATE.insights++; }},
      { type: 'dad', text: '爸爸跟你說一個秘密——', delay: 600 },
      { type: 'dad', text: '很多大人也會中一種叫做<strong>「假裝努力」</strong>的魔法。😱', delay: 800 },

      { type: 'next', text: '繼續探索 →' }

  // CH1: 資源層級
  {

      { type: 'next', text: '接著看看「自由時間」能做什麼 →' }

// ============================================
// RENDER ENGINE (same architecture)
// ============================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let sceneIndex = 0;
let isAnimating = false;

function showScreen(id) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $(`#${id}`).classList.add('active');
}

function startGame() {
  showScreen('game-screen');
  STATE.chapter = 0; sceneIndex = 0;
  renderMiniMap(); playChapter();
}

function renderMiniMap() {
  const map = $('#miniMap'); map.innerHTML = '';
  for (let i = 0; i < STATE.totalChapters; i++) {
    const d = document.createElement('div');
    d.className = 'map-dot';
    if (i < STATE.chapter) d.classList.add('done');
    if (i === STATE.chapter) d.classList.add('current');
    map.appendChild(d);
  }
  $('#progressBar').style.width = `${(STATE.chapter / STATE.totalChapters)*100}%`;
}

async function playChapter() {
  const ch = CHAPTERS[STATE.chapter]; if (!ch) return;
  $('#dialogueArea').innerHTML = '';
  $('#choiceArea').innerHTML = '';
  sceneIndex = 0;
  await playNextScene();
}

async function playNextScene() {
  const ch = CHAPTERS[STATE.chapter];
  if (!ch || sceneIndex >= ch.scenes.length) return;
  const sc = ch.scenes[sceneIndex];
  const area = $('#dialogueArea');
  const ca = $('#choiceArea');

  switch (sc.type) {
    case 'chapter':
      area.innerHTML += `<div class="chapter-header" style="animation:fadeIn .6s ease"><div class="chapter-num">${sc.num}</div><div class="chapter-title">${sc.title}</div></div>`;
      sceneIndex++; await dl(400); await playNextScene(); break;

    case 'narrator':
      area.innerHTML += `<div class="msg narrator" style="animation:msgIn .4s ease"><div class="msg-bubble">${sc.text}</div></div>`;
      scrollBot(); sceneIndex++; await dl(sc.delay||500); await playNextScene(); break;

    case 'dad': case 'kid': {
      const tid = `t-${Date.now()}`;
      area.innerHTML += `<div class="msg ${sc.type}" id="${tid}"><div class="msg-avatar">${sc.type==='dad'?'👨':'👦'}</div><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      scrollBot(); await dl(sc.delay||600);
      const txt = typeof sc.text==='function'? sc.text() : sc.text;
      const el = document.getElementById(tid);
      if(el) el.innerHTML = `<div class="msg-avatar">${sc.type==='dad'?'👨':'👦'}</div><div class="msg-bubble">${txt.replace(/\n/g,'<br>')}</div>`;
      scrollBot(); sceneIndex++; await dl(300); await playNextScene(); break;
    }

    case 'choice':
      ca.innerHTML = '';
      if(sc.text) ca.innerHTML += `<div style="font-size:13px;color:var(--text-dim);margin-bottom:6px;text-align:center;">${sc.text}</div>`;
      sc.choices.forEach(c => {
        const b = document.createElement('button');
        b.className = 'btn-choice';
        b.innerHTML = `<span class="choice-icon">${c.icon}</span> ${c.text}`;
        b.onclick = () => {
          if(isAnimating) return; isAnimating = true;
          if(sc.onChoice) sc.onChoice(c.value);
          area.innerHTML += `<div class="msg kid" style="animation:msgIn .4s ease"><div class="msg-avatar">👦</div><div class="msg-bubble">${c.text}</div></div>`;
          ca.innerHTML = ''; scrollBot(); sceneIndex++;
          setTimeout(async()=>{ isAnimating=false; await playNextScene(); },500);
        };
        ca.appendChild(b);
      });
      scrollBot(); break;

    case 'input':
      ca.innerHTML = `<div style="margin:10px 0"><div style="font-size:13px;color:var(--text-dim);margin-bottom:6px;">${sc.prompt}</div><textarea class="thought-input" id="thInput" placeholder="在這裡寫下你的想法..." rows="2"></textarea><button class="btn-next" id="thSub" style="margin-top:8px;">✏️ 寫好了</button></div>`;
      scrollBot();
      $('#thSub').onclick = () => {
        const v = $('#thInput').value.trim()||'（還在想...）';
        STATE.answers[sc.key] = v; STATE.journal.push({label:sc.prompt,value:v});
        area.innerHTML += `<div class="msg kid" style="animation:msgIn .4s ease"><div class="msg-avatar">👦</div><div class="msg-bubble">${v}</div></div>`;
        ca.innerHTML = ''; scrollBot(); sceneIndex++; setTimeout(()=>playNextScene(),500);
      };
      break;

    case 'widget':
      renderWidget(sc.widget, area); scrollBot(); sceneIndex++; await dl(600); await playNextScene(); break;

    case 'next':
      ca.innerHTML = `<button class="btn-next" id="nxtCh">${sc.text}</button>`;
      scrollBot();
      $('#nxtCh').onclick = () => {
        STATE.chapter++; renderMiniMap(); ca.innerHTML = ''; sceneIndex = 0;
        showAch(); setTimeout(()=>playChapter(),300);
      };
      break;
  }
}

// ============================================
// POMODORO ENGINE
// ============================================
function openPomodoro() {
  showScreen('pomo-screen');
  pomoReset();
  updatePomoUI();
}

function closePomo() {
  if (POMO.phase === 'focus') {
    if (!confirm('專注中！確定要離開嗎？（計時器會重置）')) return;
  }
  if (POMO.interval) clearInterval(POMO.interval);
  POMO.phase = 'idle';
  showScreen('title-screen');
}

function setFocusDur(min, el) {
  if (POMO.phase !== 'idle') return;
  POMO.focusDur = min;
  document.querySelectorAll('[data-focus]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  pomoReset();
}

function setBreakDur(min, el) {
  if (POMO.phase !== 'idle') return;
  POMO.breakDur = min;
  document.querySelectorAll('[data-break]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function pomoReset() {
  if (POMO.interval) clearInterval(POMO.interval);
  POMO.phase = 'idle';
  POMO.remaining = POMO.focusDur * 60;
  POMO.totalTime = POMO.focusDur * 60;
  updatePomoUI();
}

function pomoToggle() {
  switch (POMO.phase) {
    case 'idle':
      pomoStartFocus(); break;
    case 'focus':
      POMO.phase = 'paused-focus';
      clearInterval(POMO.interval);
      updatePomoUI(); break;
    case 'paused-focus':
      POMO.phase = 'focus';
      pomoTick(); updatePomoUI(); break;
    case 'break':
      POMO.phase = 'paused-break';
      clearInterval(POMO.interval);
      updatePomoUI(); break;
    case 'paused-break':
      POMO.phase = 'break';
      pomoTick(); updatePomoUI(); break;
  }
}

function pomoStartFocus() {
  POMO.phase = 'focus';
  POMO.remaining = POMO.focusDur * 60;
  POMO.totalTime = POMO.focusDur * 60;
  setDadTip(DAD_TIPS_FOCUS[Math.floor(Math.random()*DAD_TIPS_FOCUS.length)]);
  pomoTick();
  updatePomoUI();
}

function pomoStartBreak() {
  POMO.phase = 'break';
  POMO.remaining = POMO.breakDur * 60;
  POMO.totalTime = POMO.breakDur * 60;
  setDadTip(DAD_TIPS_BREAK[Math.floor(Math.random()*DAD_TIPS_BREAK.length)]);
  pomoTick();
  updatePomoUI();
}

function pomoSkipBreak() {
  if (POMO.interval) clearInterval(POMO.interval);
  POMO.phase = 'idle';
  POMO.remaining = POMO.focusDur * 60;
  POMO.totalTime = POMO.focusDur * 60;
  setDadTip('準備好了嗎？先寫下你這回合要<strong>打倒的小怪</strong>（任務），然後啟動無敵星星！⭐');
  updatePomoUI();
}

function pomoTick() {
  if (POMO.interval) clearInterval(POMO.interval);
  POMO.interval = setInterval(() => {
    POMO.remaining--;
    if (POMO.remaining <= 0) {
      clearInterval(POMO.interval);
      if (POMO.phase === 'focus') {
        pomoCompleteFocus();
      } else if (POMO.phase === 'break') {
        pomoCompleteBreak();
      }
      return;
    }
    updatePomoUI();
    // Spawn star particles during focus
    if (POMO.phase === 'focus' && Math.random() < 0.1) spawnStarParticle();
  }, 1000);
}

function pomoCompleteFocus() {
  POMO.sessions++;
  POMO.totalMinutes += POMO.focusDur;
  POMO.streak++;
  if (POMO.streak > POMO.bestStreak) POMO.bestStreak = POMO.streak;
  playSound('complete');

  // Show achievement
  let tip = DAD_TIPS_DONE[Math.floor(Math.random()*DAD_TIPS_DONE.length)];
  tip = tip.replace('{m}', POMO.focusDur).replace('{n}', POMO.streak);
  setDadTip(tip);
  showAch('⭐ 無敵星星完成！', `+${POMO.focusDur} 分鐘專注力！連擊 x${POMO.streak}`);

  // Show combo
  if (POMO.streak >= 2) {
    const cb = $('#pomoCombo');
    cb.classList.add('show');
    $('#pomoComboStars').textContent = '⭐'.repeat(Math.min(POMO.streak, 8));
    $('#pomoComboText').textContent = `${POMO.streak} 連擊 COMBO！`;
  }

  // Auto transition to break
  POMO.phase = 'idle';
  updatePomoUI();
  setTimeout(() => {
    if (POMO.phase === 'idle') pomoStartBreak();
  }, 1500);
}

function pomoCompleteBreak() {
  playSound('break-end');
  POMO.phase = 'idle';
  POMO.remaining = POMO.focusDur * 60;
  POMO.totalTime = POMO.focusDur * 60;
  setDadTip('休息結束！準備好迎接下一回合了嗎？你可以繼續啟動無敵星星！⭐');
  updatePomoUI();
}

function updatePomoUI() {
  const min = Math.floor(POMO.remaining / 60);
  const sec = POMO.remaining % 60;
  const timeStr = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  const timeEl = $('#pomoTimeDisplay');
  const ringEl = $('#pomoRingFill');
  const labelEl = $('#pomoPhaseLabel');
  const ctrlEl = $('#pomoControls');
  const durEl = $('#pomoDurSection');

  timeEl.textContent = timeStr;

  // Ring progress
  const circ = 2 * Math.PI * 105; // ~659.73
  const prog = POMO.totalTime > 0 ? POMO.remaining / POMO.totalTime : 1;
  ringEl.style.strokeDashoffset = circ * (1 - prog);

  // Phase styling
  timeEl.className = 'pomo-time';
  ringEl.className = 'pomo-ring-fill';

  const isFocus = POMO.phase === 'focus' || POMO.phase === 'paused-focus';
  const isBreak = POMO.phase === 'break' || POMO.phase === 'paused-break';
  const isPaused = POMO.phase === 'paused-focus' || POMO.phase === 'paused-break';

  if (isBreak) {
    timeEl.classList.add('break-mode');
    ringEl.classList.add('break-mode');
  }
  if (isFocus && POMO.remaining <= 30 && POMO.remaining > 0) {
    timeEl.classList.add('warn');
    ringEl.classList.add('warn');
  }

  // Phase label
  if (POMO.phase === 'idle') labelEl.innerHTML = '<span class="phase-icon">⭐</span> 準備就緒';
  else if (POMO.phase === 'focus') labelEl.innerHTML = '<span class="phase-icon">🔥</span> 無敵星星啟動中...';
  else if (POMO.phase === 'paused-focus') labelEl.innerHTML = '<span class="phase-icon">⏸️</span> 暫停中...';
  else if (POMO.phase === 'break') labelEl.innerHTML = '<span class="phase-icon">☕</span> 休息中...';
  else if (POMO.phase === 'paused-break') labelEl.innerHTML = '<span class="phase-icon">⏸️</span> 休息暫停';

  // Controls
  if (POMO.phase === 'idle') {
    ctrlEl.innerHTML = `<button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">⭐ 啟動無敵星星</button>`;
    durEl.style.display = '';
  } else if (POMO.phase === 'focus') {
    ctrlEl.innerHTML = `<button class="pomo-btn pomo-btn-pause" onclick="pomoToggle()">⏸ 暫停</button><button class="pomo-btn pomo-btn-reset" onclick="pomoReset()">✕ 放棄</button>`;
    durEl.style.display = 'none';
  } else if (POMO.phase === 'paused-focus') {
    ctrlEl.innerHTML = `<button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">▶ 繼續</button><button class="pomo-btn pomo-btn-reset" onclick="pomoReset()">✕ 放棄</button>`;
    durEl.style.display = 'none';
  } else if (POMO.phase === 'break') {
    ctrlEl.innerHTML = `<button class="pomo-btn pomo-btn-pause" onclick="pomoToggle()">⏸ 暫停</button><button class="pomo-btn pomo-btn-skip" onclick="pomoSkipBreak()">⏭ 跳過休息</button>`;
    durEl.style.display = 'none';
  } else if (POMO.phase === 'paused-break') {
    ctrlEl.innerHTML = `<button class="pomo-btn pomo-btn-start" onclick="pomoToggle()">▶ 繼續</button><button class="pomo-btn pomo-btn-skip" onclick="pomoSkipBreak()">⏭ 跳過休息</button>`;
    durEl.style.display = 'none';
  }

  // Stats
  $('#pomoStatSessions').textContent = POMO.sessions;
  $('#pomoStatMinutes').textContent = POMO.totalMinutes;
  $('#pomoStatStreak').textContent = POMO.bestStreak;
  $('#pomoStatTasks').textContent = POMO.tasksCompleted;
  $('#pomoStreakBadge').textContent = `🔥 ${POMO.streak}`;
}

function setDadTip(html) {
  $('#pomoDadTipText').innerHTML = html;
}

// Task management
function addPomoTask() {
  const input = $('#pomoTaskInput');
  const text = input.value.trim();
  if (!text) return;
  POMO.tasks.push({ text, done: false, id: Date.now() });
  input.value = '';
  renderPomoTasks();
}

function togglePomoTask(id) {
  const t = POMO.tasks.find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    if (t.done) {
      POMO.tasksCompleted++;
      playSound('task');
    } else {
      POMO.tasksCompleted = Math.max(0, POMO.tasksCompleted - 1);
    }
    renderPomoTasks();
    updatePomoUI();
  }
}

function deletePomoTask(id) {
  POMO.tasks = POMO.tasks.filter(t => t.id !== id);
  renderPomoTasks();
}

function renderPomoTasks() {
  const list = $('#pomoTaskList');
  list.innerHTML = '';
  POMO.tasks.forEach(t => {
    const li = document.createElement('li');
    li.className = `pomo-task-item ${t.done ? 'done' : ''}`;
    li.innerHTML = `
      <button class="pomo-task-check" onclick="togglePomoTask(${t.id})">${t.done ? '✓' : ''}</button>
      <span class="pomo-task-text">${t.text}</span>
      <button class="pomo-task-del" onclick="deletePomoTask(${t.id})">×</button>
    `;
    list.appendChild(li);
  });
}

// Star particles
function spawnStarParticle() {
  const wrap = $('#pomoRingWrap');
  if (!wrap) return;
  const p = document.createElement('div');
  p.className = 'star-particle';
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 40;
  p.style.left = (120 + Math.cos(angle) * 60) + 'px';
  p.style.top = (120 + Math.sin(angle) * 60) + 'px';
  p.style.setProperty('--tx', `${Math.cos(angle)*dist}px`);
  p.style.setProperty('--ty', `${Math.sin(angle)*dist}px`);
  wrap.appendChild(p);
  requestAnimationFrame(() => p.classList.add('active'));
  setTimeout(() => p.remove(), 2000);
}

// Enter key for task input
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement === $('#pomoTaskInput')) {
    addPomoTask();
  }
});

// ============================================
// SOUND (Web Audio API - no external files)
// ============================================
function getAudioCtx() {
  if (!POMO.audioCtx) POMO.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return POMO.audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'complete') {
      // Victory jingle: ascending notes
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      notes.forEach((freq, i) => {
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
      });
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.8);
    } else if (type === 'break-end') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.setValueAtTime(550, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(440, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'task') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }
  } catch(e) {}
}

function startMiniTimer() {
  let sec = 10;
  const d = document.getElementById('timerDisplay');
  if (!d) return;
  const iv = setInterval(() => {
    sec--;
    d.textContent = `00:${sec.toString().padStart(2,'0')}`;
    if (sec <= 3) d.style.color = 'var(--accent-pink)';
    if (sec <= 0) {
      clearInterval(iv);
      d.textContent = '⭐ 完成！';
      d.style.color = 'var(--accent-yellow)';
      setTimeout(() => { d.textContent = '15:00'; d.style.color = 'var(--accent-green)'; }, 2000);
    }
  }, 1000);
}
